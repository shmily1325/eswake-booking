            <div class="modal-content" style="max-width: 800px; max-height: 90vh; overflow-y: auto;">
                <!-- 將由 JavaScript 動態生成 -->
            </div>
        </div>
        
        <div id="board-slot-dialog" class="modal">
            <div class="modal-content" style="max-width: 500px; max-height: 90vh; overflow-y: auto;">
                <!-- 將由 JavaScript 動態生成 -->
            </div>
        </div>
    </div>
    
    <script>
        // 全域變數 - 使用 IndexedDB 作為資料庫
        let db = null;
        let DB_NAME = localStorage.getItem('eswake-offline-active-db') || 'eswake-offline';
        const DB_VERSION = 4;
        const BACKUP_FORMAT_VERSION = 3;
        const REQUIRED_BACKUP_TABLES = [
            'members', 'coaches', 'boats', 'bookings', 'booking_members',
            'booking_coaches', 'booking_drivers', 'transactions',
            'daily_announcements', 'reservation_restrictions'
        ];
        const OFFLINE_STORE_CONFIG = {
            members: { keyPath: 'id' },
            coaches: { keyPath: 'id' },
            boats: { keyPath: 'id', autoIncrement: true },
            admin_users: { keyPath: 'id' },
            allowed_users: { keyPath: 'id' },
            editor_users: { keyPath: 'id' },
            view_users: { keyPath: 'id' },
            member_notes: { keyPath: 'id', autoIncrement: true },
            billing_relations: { keyPath: 'id', autoIncrement: true },
            board_storage: { keyPath: 'id', autoIncrement: true },
            products: { keyPath: 'id' },
            product_variants: { keyPath: 'id' },
            boat_unavailable_dates: { keyPath: 'id', autoIncrement: true },
            coach_time_off: { keyPath: 'id', autoIncrement: true },
            bookings: { keyPath: 'id', autoIncrement: true },
            booking_members: { keyPath: 'id', autoIncrement: true },
            booking_coaches: { keyPath: 'id', autoIncrement: true },
            booking_drivers: { keyPath: 'id', autoIncrement: true },
            coach_reports: { keyPath: 'id', autoIncrement: true },
            booking_participants: { keyPath: 'id', autoIncrement: true },
            shop_orders: { keyPath: 'id' },
            shop_order_items: { keyPath: 'id' },
            shop_order_settlements: { keyPath: 'id' },
            transactions: { keyPath: 'id', autoIncrement: true },
            shop_order_no_seq: { keyPath: 'seq_date' },
            daily_announcements: { keyPath: 'id', autoIncrement: true },
            reservation_restrictions: { keyPath: 'id', autoIncrement: true },
            audit_log: { keyPath: 'id', autoIncrement: true },
            system_settings: { keyPath: 'id', autoIncrement: true },
            line_bindings: { keyPath: 'id', autoIncrement: true },
            backup_logs: { keyPath: 'id', autoIncrement: true }
        };
        // 首頁只呈現任務導向的入口；完整資料集放在「營運資料」與「系統參考」次層。
        const menuGroups = [
            {
                title: '斷網作業',
                description: '最常用的現場流程',
                items: [
                    { title: '今日預約', symbol: '📅', description: '依船隻與時間查看當日安排', action: 'coach-daily' },
                    { title: '預約清單', symbol: '🗓️', description: '依日期查看限制、停用船隻與完整預約', action: 'day' },
                    { title: '預約查詢', symbol: '🔍', description: '依會員、船隻或教練搜尋', action: 'search' },
                    { title: '明日提醒', symbol: '⏰', description: '產生會員與教練提醒文字', action: 'tomorrow' },
                    { title: '異動暫存', symbol: '📝', description: '斷網時記錄待補登預約', action: 'change-journal' }
                ]
            },
            {
                title: '營運資料',
                description: '完整備份中的唯讀資料',
                items: [
                    { title: '會員與櫃台', symbol: '👥', description: '會員、交易、置板與 LINE 綁定', action: 'bao' },
                    { title: '教練營運', symbol: '🏄', description: '回報、參與者、拆帳與休假', action: 'coach-operations' },
                    { title: '商品與訂單', symbol: '📦', description: '庫存、全部訂單與結算歷史', action: 'shop-recovery' },
                    { title: '公告與限制', symbol: '📣', description: '公告、預約限制與船隻停用', action: 'restrictions' },
                    { title: '異動記錄', symbol: '📋', description: '查看完整 audit log', action: 'audit-log' }
                ]
            },
            {
                title: '備援參考',
                description: '低頻但重建系統時需要',
                items: [
                    { title: '備份紀錄', symbol: '💾', description: '確認各類備份成功與失敗紀錄', action: 'backup-logs' },
                    { title: '系統參考', symbol: '⚙️', description: '設定、人員權限與技術資料', action: 'system-reference' }
                ]
            }
        ];
        const menuItems = menuGroups.flatMap(group => group.items);
        
        // 顯示訊息
        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('db-alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        // 動態創建表的輔助函數
        // 使用一個集合來追蹤需要創建的表，然後一次性創建
        const pendingTables = new Map(); // 使用 Map 來存儲表配置
        let isUpgrading = false; // 升級鎖定標記
        
        async function createTableIfNotExists(tableName, keyPath = 'id', autoIncrement = false) {
            if (db && db.objectStoreNames.contains(tableName)) {
                return; // 表已存在
            }
            
            // 將表添加到待創建列表
            pendingTables.set(tableName, { keyPath, autoIncrement });
            
            // 如果正在升級，等待完成
            if (isUpgrading) {
                // 等待升級完成
                while (isUpgrading) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                // 檢查表是否已經被創建
                if (db && db.objectStoreNames.contains(tableName)) {
                    return;
                }
            }
            
            // 調用 createAllPendingTables 來一次性創建所有表
            await createAllPendingTables();
        }
        
        // 一次性創建所有待創建的表（在處理 SQL 語句之前調用）
        async function createAllPendingTables() {
            if (pendingTables.size === 0) {
                return;
            }
            
            if (isUpgrading) {
                // 等待升級完成
                while (isUpgrading) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                return;
            }
            
            if (!db) {
                await initDatabase();
            }
            
            // 再次檢查，可能已經被創建了
            const tablesToCreate = [];
            pendingTables.forEach((config, name) => {
                if (!db.objectStoreNames.contains(name)) {
                    tablesToCreate.push({ name, ...config });
                }
            });
            
            if (tablesToCreate.length === 0) {
                pendingTables.clear();
                return;
            }
            
            isUpgrading = true;
            const currentVersion = db.version;
            const newVersion = currentVersion + 1;
            
            // 關閉當前連接
            db.close();
            db = null;
            
            try {
                await new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, newVersion);
                    
                    request.onerror = (e) => {
                        isUpgrading = false;
                        console.error('資料庫開啟錯誤:', e);
                        reject(new Error('無法開啟資料庫以創建表: ' + (request.error?.message || '未知錯誤')));
                    };
                    
                    request.onsuccess = () => {
                        db = request.result;
                        isUpgrading = false;
                        console.log(`✅ 已創建 ${tablesToCreate.length} 個表`);
                        pendingTables.clear();
                        resolve(db);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        try {
                            const database = event.target.result;
                            
                            // 重新創建所有現有表（如果不存在）
                            const existingStores = OFFLINE_STORE_CONFIG;
                            
                            // 創建現有表
                            Object.keys(existingStores).forEach(storeName => {
                                if (!database.objectStoreNames.contains(storeName)) {
                                    const config = existingStores[storeName];
                                    const store = database.createObjectStore(storeName, {
                                        keyPath: config.keyPath,
                                        autoIncrement: config.autoIncrement
                                    });
                                    if (config.index) {
                                        store.createIndex(config.index.name, config.index.name, { unique: config.index.unique });
                                    }
                                }
                            });
                            
                            // 創建所有待創建的表
                            tablesToCreate.forEach(({ name, keyPath, autoIncrement }) => {
                                if (!database.objectStoreNames.contains(name)) {
                                    const options = { keyPath: keyPath };
                                    if (autoIncrement) {
                                        options.autoIncrement = true;
                                    }
                                    database.createObjectStore(name, options);
                                    console.log(`📋 創建表: ${name}`);
                                }
                            });
                        } catch (upgradeError) {
                            console.error('升級資料庫時發生錯誤:', upgradeError);
                            reject(upgradeError);
                        }
                    };
                });
            } catch (error) {
                isUpgrading = false;
                // 嘗試重新打開資料庫
                try {
                    await initDatabase();
                } catch (reopenError) {
                    console.error('重新打開資料庫失敗:', reopenError);
                }
                throw error;
            }
        }
        
        // 初始化 IndexedDB
        async function getCurrentDatabaseVersion() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    const current = request.result;
                    const version = current.version;
                    current.close();
                    resolve(Math.max(version, DB_VERSION));
                };
            });
        }

        async function initDatabase() {
            if (db) return db;

            // SQL 匯入器可能動態提高 DB version；永遠以現有或最低版本中較高者開啟。
            const targetVersion = await getCurrentDatabaseVersion();
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, targetVersion);
                
                request.onerror = (event) => {
                    const error = request.error || event.target?.error;
                    const errorMessage = error ? 
                        `無法開啟資料庫: ${error.name} - ${error.message}` : 
                        '無法開啟資料庫: 未知錯誤';
                    console.error('資料庫開啟錯誤:', errorMessage, error);
                    reject(new Error(errorMessage));
                };
                
                request.onsuccess = async () => {
                    db = request.result;
                    console.log('✅ 資料庫已開啟');
                    const missingShopStores = Object.keys(OFFLINE_STORE_CONFIG).filter(
                        storeName => !db.objectStoreNames.contains(storeName)
                    );
                    if (missingShopStores.length > 0) {
                        missingShopStores.forEach(storeName => {
                            pendingTables.set(storeName, OFFLINE_STORE_CONFIG[storeName]);
                        });
                        try {
                            await createAllPendingTables();
                        } catch (error) {
                            reject(error);
                            return;
                        }
                    }
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    try {
                        const database = event.target.result;
                        
                        // 建立資料表（Object Stores）
                        if (!database.objectStoreNames.contains('members')) {
                            database.createObjectStore('members', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('boats')) {
                            const boatStore = database.createObjectStore('boats', { keyPath: 'id', autoIncrement: true });
                            boatStore.createIndex('name', 'name', { unique: true });
                        }
                        if (!database.objectStoreNames.contains('coaches')) {
                            database.createObjectStore('coaches', { keyPath: 'id' });
                        }
                    if (!database.objectStoreNames.contains('bookings')) {
                        const bookingStore = database.createObjectStore('bookings', { keyPath: 'id', autoIncrement: true });
                        bookingStore.createIndex('start_at', 'start_at');
                    }
                    if (!database.objectStoreNames.contains('booking_coaches')) {
                        database.createObjectStore('booking_coaches', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!database.objectStoreNames.contains('booking_drivers')) {
                        database.createObjectStore('booking_drivers', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!database.objectStoreNames.contains('booking_members')) {
                        database.createObjectStore('booking_members', { keyPath: 'id', autoIncrement: true });
                    }
                        if (!database.objectStoreNames.contains('daily_announcements')) {
                            database.createObjectStore('daily_announcements', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('coach_time_off')) {
                            database.createObjectStore('coach_time_off', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('audit_log')) {
                            database.createObjectStore('audit_log', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('transactions')) {
                            database.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('board_storage')) {
                            database.createObjectStore('board_storage', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('member_notes')) {
                            database.createObjectStore('member_notes', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains('products')) {
                            database.createObjectStore('products', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('product_variants')) {
                            database.createObjectStore('product_variants', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('shop_orders')) {
                            database.createObjectStore('shop_orders', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('shop_order_items')) {
                            database.createObjectStore('shop_order_items', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('shop_order_settlements')) {
                            database.createObjectStore('shop_order_settlements', { keyPath: 'id' });
                        }

                        Object.entries(OFFLINE_STORE_CONFIG).forEach(([storeName, config]) => {
                            if (!database.objectStoreNames.contains(storeName)) {
                                database.createObjectStore(storeName, {
                                    keyPath: config.keyPath,
                                    autoIncrement: Boolean(config.autoIncrement)
                                });
                            }
                        });
                        
                        console.log('✅ 資料表已建立');
                    } catch (upgradeError) {
                        console.error('升級資料庫時發生錯誤:', upgradeError);
                        reject(new Error(`升級資料庫失敗: ${upgradeError.message}`));
                    }
                };
                
                request.onblocked = () => {
                    console.warn('資料庫升級被阻止，請關閉其他標籤頁');
                    reject(new Error('資料庫升級被阻止，請關閉其他使用此資料庫的標籤頁'));
                };
            });
        }
        
        // 刪除並重新創建資料庫（用於修復損壞的資料庫）
        async function resetDatabase() {
            return new Promise((resolve, reject) => {
                // 關閉當前連接
                if (db) {
                    db.close();
                    db = null;
                }
                
                // 刪除資料庫
                const deleteRequest = indexedDB.deleteDatabase(DB_NAME);
                
                deleteRequest.onerror = () => {
                    reject(new Error('無法刪除資料庫: ' + (deleteRequest.error?.message || '未知錯誤')));
                };
                
                deleteRequest.onsuccess = () => {
                    console.log('✅ 舊資料庫已刪除');
                    // 重新初始化
                    initDatabase()
                        .then(() => {
                            console.log('✅ 資料庫已重新創建');
                            resolve(db);
                        })
                        .catch(reject);
                };
            });
        }
        
        function parseBackupManifest(text) {
            const match = text.match(/^-- ESWAKE_BACKUP_MANIFEST: (.+)$/m);
            if (!match) throw new Error('不是受支援的 ESWake 完整備份：缺少 manifest');
            let manifest;
            try {
                manifest = JSON.parse(match[1]);
            } catch {
                throw new Error('備份 manifest 格式損壞');
            }
            if (manifest.formatVersion !== BACKUP_FORMAT_VERSION) {
                throw new Error(`備份格式版本不相容：需要 ${BACKUP_FORMAT_VERSION}，取得 ${manifest.formatVersion}`);
            }
            const missing = REQUIRED_BACKUP_TABLES.filter(table => !manifest.tables?.includes(table));
            if (missing.length > 0) {
                throw new Error(`備份缺少必要資料表：${missing.join(', ')}`);
            }
            return manifest;
        }

        async function verifyImportedManifest(manifest) {
            const mismatches = [];
            for (const tableName of manifest.tables) {
                if (!db.objectStoreNames.contains(tableName)) {
                    mismatches.push(`${tableName}: 缺少資料表`);
                    continue;
                }
                const actual = await new Promise((resolve, reject) => {
                    const request = db.transaction(tableName, 'readonly').objectStore(tableName).count();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
                const expected = manifest.stats[tableName] || 0;
                if (actual !== expected) mismatches.push(`${tableName}: ${actual}/${expected}`);
            }
            if (mismatches.length > 0) {
                throw new Error(`匯入筆數驗證失敗：${mismatches.slice(0, 8).join('、')}`);
            }
        }

        function deleteOfflineDatabase(name) {
            return new Promise(resolve => {
                const request = indexedDB.deleteDatabase(name);
                request.onsuccess = request.onerror = request.onblocked = () => resolve();
            });
        }

        function normalizePostgresArrayValue(value) {
            if (Array.isArray(value)) return value.map(item => String(item)).filter(Boolean);
            if (value == null || value === '') return [];
            let text = String(value).trim();
            if (/^ARRAY\[/i.test(text) && text.endsWith(']')) {
                text = text.slice(text.indexOf('[') + 1, -1);
            } else if (text.startsWith('{') && text.endsWith('}')) {
                text = text.slice(1, -1);
            } else {
                return [text];
            }
            return text.split(',')
                .map(item => item.trim().replace(/^['"]|['"]$/g, '').replace(/''/g, "'"))
                .filter(Boolean);
        }
        
        // 載入 SQL 檔案
        async function loadSQLFile(file) {
            // 在函數開始時就設置載入標記，防止重複觸發
            if (isFileLoading) {
                console.log('檔案正在載入中，忽略重複調用');
                return;
            }
            isFileLoading = true;
            
            console.log('開始載入 SQL 檔案:', file.name, '大小:', file.size, 'bytes');
            
            const loadingDiv = document.getElementById('db-loading');
            if (loadingDiv) {
                loadingDiv.classList.remove('hidden');
            }
            
            // 禁用 input 和 label，防止重複點擊
            const fileInput = document.getElementById('sql-file');
            const label = fileInput?.closest('label');
            if (fileInput) fileInput.disabled = true;
            if (label) label.style.pointerEvents = 'none';
            
            let previousDatabaseName = DB_NAME;
            let stagingDatabaseName = null;
            let importActivated = false;
            try {
                const text = await file.text();
                const manifest = parseBackupManifest(text);
                console.log('備份驗證完成:', manifest);

                stagingDatabaseName = `eswake-offline-import-${Date.now()}`;
                if (db) db.close();
                db = null;
                DB_NAME = stagingDatabaseName;

                // 嘗試初始化資料庫，如果失敗則嘗試重置
                try {
                    await initDatabase();
                    console.log('資料庫已初始化');
                } catch (initError) {
                    console.warn('資料庫初始化失敗，嘗試重置資料庫...', initError);
                    try {
                        await resetDatabase();
                        console.log('staging 資料庫已重建');
                    } catch (resetError) {
                        console.error('重建 staging 資料庫失敗:', resetError);
                        throw new Error(`無法初始化 staging 資料庫: ${initError.message}。重建也失敗: ${resetError.message}`);
                    }
                }
                
                console.log('檔案讀取完成，長度:', text.length);
                
                // 先掃描所有 CREATE TABLE 語句，收集需要創建的表
                console.log('📋 掃描 CREATE TABLE 語句...');
                const createTableMatches = text.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(\w+)/gi);
                if (createTableMatches) {
                    createTableMatches.forEach(match => {
                        const tableName = match.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(\w+)/i)[1];
                        if (!db.objectStoreNames.contains(tableName)) {
                            // 檢查是否有 id SERIAL/BIGSERIAL
                            const tableDef = text.match(new RegExp(`CREATE\\s+TABLE\\s+(?:IF\\s+NOT\\s+EXISTS\\s+)?${tableName}[\\s\\S]*?(?=CREATE|$)`, 'i'));
                            let keyPath = 'id';
                            let autoIncrement = false;
                            if (tableDef) {
                                autoIncrement = /id\s+(?:SERIAL|BIGSERIAL)/i.test(tableDef[0]);
                            }
                            pendingTables.set(tableName, { keyPath, autoIncrement });
                            console.log(`📋 發現需要創建的表: ${tableName}`);
                        }
                    });
                }
                
                // 一次性創建所有需要的表
                if (pendingTables.size > 0) {
                    console.log(`📋 準備創建 ${pendingTables.size} 個表...`);
                    await createAllPendingTables();
                }
                
                // 更好的 SQL 語句分割（處理多行和註解）
                const statements = [];
                let currentStatement = '';
                let inString = false;
                let stringChar = '';
                
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    
                    // 處理字串
                    if ((char === "'" || char === '"') && (i === 0 || text[i - 1] !== '\\')) {
                        if (!inString) {
                            inString = true;
                            stringChar = char;
                        } else if (char === stringChar) {
                            inString = false;
                        }
                        currentStatement += char;
                        continue;
                    }
                    
                    // 處理語句結束
                    if (!inString && char === ';') {
                        currentStatement += char;
                        const trimmed = currentStatement.trim();
                        if (trimmed && !trimmed.startsWith('--') && trimmed.length > 5) {
                            statements.push(trimmed);
                        }
                        currentStatement = '';
                        continue;
                    }
                    
                    // 跳過註解
                    if (!inString && char === '-' && nextChar === '-') {
                        // 跳過到行尾
                        while (i < text.length && text[i] !== '\n') {
                            i++;
                        }
                        continue;
                    }
                    
                    currentStatement += char;
                }
                
                // 添加最後一個語句（如果有的話）
                if (currentStatement.trim() && !currentStatement.trim().startsWith('--')) {
                    statements.push(currentStatement.trim());
                }
                
                console.log('解析出', statements.length, '個 SQL 語句');
                
                let successCount = 0;
                let skipCount = 0;
                const skippedReasons = {
                    'CREATE TABLE': 0,
                    'ALTER TABLE': 0,
                    'CREATE INDEX': 0,
                    'INSERT 格式不符': 0,
                    '執行錯誤': 0,
                    '其他': 0
                };
                // 詳細記錄每個跳過的語句（用於調試）
                const skippedStatements = {
                    'CREATE TABLE': [],
                    'ALTER TABLE': [],
                    'CREATE INDEX': [],
                    'INSERT 格式不符': [],
                    '執行錯誤': [],
                    '其他': []
                };
                
                console.log('📊 開始處理 SQL 語句，總數:', statements.length);
                
                for (let idx = 0; idx < statements.length; idx++) {
                    const statement = statements[idx];
                    const trimmed = statement.trim();
                    if (!trimmed) continue;
                    
                    try {
                        const upperSql = trimmed.toUpperCase();
                        
                        // 處理 CREATE TABLE 語句 - 動態創建表
                        if (upperSql.includes('CREATE TABLE')) {
                            try {
                                const createTableMatch = trimmed.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(\w+)/i);
                                if (createTableMatch) {
                                    const tableName = createTableMatch[1];
                                    
                                    // 檢查表是否已存在
                                    if (!db.objectStoreNames.contains(tableName)) {
                                        // 嘗試從 CREATE TABLE 語句中提取主鍵
                                        let keyPath = 'id'; // 預設主鍵
                                        let autoIncrement = false;
                                        
                                        // 檢查是否有 id 欄位且是主鍵或 SERIAL/BIGSERIAL
                                        if (trimmed.match(/id\s+(?:SERIAL|BIGSERIAL|INTEGER|INT|BIGINT)/i)) {
                                            keyPath = 'id';
                                            autoIncrement = trimmed.match(/id\s+(?:SERIAL|BIGSERIAL)/i) !== null;
                                        }
                                        
                                        // 在 IndexedDB 中創建表
                                        // 注意：IndexedDB 需要在 upgrade 事件中創建，所以我們需要重新打開資料庫
                                        // 但為了簡化，我們先記錄表名，稍後統一處理
                                        console.log(`📋 [${idx + 1}/${statements.length}] 發現 CREATE TABLE: ${tableName}`);
                                        
                                        // 使用一個輔助函數來創建表
                                        await createTableIfNotExists(tableName, keyPath, autoIncrement);
                                        
                                        console.log(`✅ [${idx + 1}/${statements.length}] 表已創建: ${tableName}`);
                                    } else {
                                        console.log(`ℹ️  [${idx + 1}/${statements.length}] 表已存在: ${tableName}`);
                                    }
                                } else {
                                    skipCount++;
                                    skippedReasons['CREATE TABLE']++;
                                    const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                    skippedStatements['CREATE TABLE'].push({ index: idx + 1, preview });
                                    console.warn(`⏭️  [${idx + 1}/${statements.length}] CREATE TABLE 格式不符:`, preview);
                                }
                            } catch (createError) {
                                skipCount++;
                                skippedReasons['執行錯誤']++;
                                const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                skippedStatements['執行錯誤'].push({ 
                                    index: idx + 1, 
                                    preview, 
                                    error: `CREATE TABLE 失敗: ${createError.message}` 
                                });
                                console.error(`❌ [${idx + 1}/${statements.length}] CREATE TABLE 失敗:`, createError.message);
                            }
                            continue;
                        }
                        
                        // 跳過 ALTER TABLE（IndexedDB 不支援）
                        if (upperSql.includes('ALTER TABLE')) {
                            skipCount++;
                            skippedReasons['ALTER TABLE']++;
                            const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                            skippedStatements['ALTER TABLE'].push({ index: idx + 1, preview });
                            console.log(`⏭️  [${idx + 1}/${statements.length}] 跳過 ALTER TABLE:`, preview);
                            continue;
                        }
                        
                        // 跳過 CREATE INDEX（IndexedDB 索引需要在創建表時定義）
                        if (upperSql.includes('CREATE INDEX')) {
                            skipCount++;
                            skippedReasons['CREATE INDEX']++;
                            const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                            skippedStatements['CREATE INDEX'].push({ index: idx + 1, preview });
                            console.log(`⏭️  [${idx + 1}/${statements.length}] 跳過 CREATE INDEX:`, preview);
                            continue;
                        }
                        
                        // 處理 DELETE FROM 語句
                        if (upperSql.includes('DELETE FROM')) {
                            try {
                                const deleteMatch = trimmed.match(/DELETE\s+FROM\s+(\w+)/i);
                                if (deleteMatch) {
                                    const tableName = deleteMatch[1];
                                    
                                    // 確保表存在
                                    await createTableIfNotExists(tableName, 'id', false);
                                    
                                    // 執行 DELETE（清空表）
                                    const transaction = db.transaction([tableName], 'readwrite');
                                    const store = transaction.objectStore(tableName);
                                    await new Promise((resolve, reject) => {
                                        const request = store.clear();
                                        request.onsuccess = () => resolve();
                                        request.onerror = () => reject(request.error);
                                    });
                                    
                                    console.log(`🗑️  [${idx + 1}/${statements.length}] DELETE FROM ${tableName} - 表已清空`);
                                } else {
                                    skipCount++;
                                    skippedReasons['其他']++;
                                    const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                    skippedStatements['其他'].push({ index: idx + 1, preview });
                                    console.warn(`⏭️  [${idx + 1}/${statements.length}] DELETE FROM 格式不符:`, preview);
                                }
                            } catch (deleteError) {
                                skipCount++;
                                skippedReasons['執行錯誤']++;
                                const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                skippedStatements['執行錯誤'].push({ 
                                    index: idx + 1, 
                                    preview, 
                                    error: `DELETE FROM 失敗: ${deleteError.message}` 
                                });
                                console.error(`❌ [${idx + 1}/${statements.length}] DELETE FROM 失敗:`, deleteError.message);
                            }
                            continue;
                        }
                        
                        // 處理 INSERT
                        if (upperSql.includes('INSERT INTO')) {
                            // 改進的正則表達式，支援更複雜的格式（包括多行 VALUES）
                            const insertMatch = trimmed.match(/INSERT\s+INTO\s+(\w+)\s*\(([^)]+)\)\s*VALUES\s*(.+)/is);
                            if (insertMatch) {
                                const tableName = insertMatch[1];
                                const columnsStr = insertMatch[2];
                                const allValuesStr = insertMatch[3];
                                
                                // 檢查表是否存在，如果不存在則自動創建
                                if (!db.objectStoreNames.contains(tableName)) {
                                    console.log(`⚠️  表 "${tableName}" 不存在，嘗試自動創建...`);
                                    try {
                                        await createTableIfNotExists(tableName, 'id', false);
                                        console.log(`✅ 表 "${tableName}" 已自動創建`);
                                    } catch (createError) {
                                        skipCount++;
                                        skippedReasons['執行錯誤']++;
                                        const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                        skippedStatements['執行錯誤'].push({ 
                                            index: idx + 1, 
                                            preview, 
                                            error: `表 "${tableName}" 不存在且無法創建: ${createError.message}` 
                                        });
                                        console.warn(`⏭️  [${idx + 1}/${statements.length}] 表不存在且無法創建: ${tableName}`);
                                        continue;
                                    }
                                }
                                
                                // 解析欄位名稱
                                const columns = columnsStr.split(',').map(c => c.trim().replace(/["']/g, ''));
                                
                                // 解析多個 VALUES 子句（處理 VALUES (...), (...), (...) 的情況）
                                function parseMultipleValues(allValuesStr) {
                                    const valueGroups = [];
                                    let current = '';
                                    let parenDepth = 0;
                                    let inString = false;
                                    let stringChar = '';
                                    
                                    for (let i = 0; i < allValuesStr.length; i++) {
                                        const char = allValuesStr[i];
                                        const nextChar = allValuesStr[i + 1];
                                        
                                        if (!inString && (char === "'" || char === '"')) {
                                            inString = true;
                                            stringChar = char;
                                            current += char;
                                        } else if (inString && char === stringChar) {
                                            if (nextChar === stringChar) {
                                                current += char + nextChar;
                                                i++;
                                            } else {
                                                inString = false;
                                                stringChar = '';
                                                current += char;
                                            }
                                        } else if (!inString && char === '(') {
                                            if (parenDepth === 0) {
                                                current = ''; // 開始新的值組
                                            }
                                            parenDepth++;
                                            current += char;
                                        } else if (!inString && char === ')') {
                                            parenDepth--;
                                            current += char;
                                            if (parenDepth === 0) {
                                                // 完成一個值組
                                                valueGroups.push(current.trim());
                                                current = '';
                                            }
                                        } else {
                                            current += char;
                                        }
                                    }
                                    
                                    return valueGroups;
                                }
                                
                                // 解析所有 VALUES 子句
                                const valueGroups = parseMultipleValues(allValuesStr);
                                
                                if (valueGroups.length === 0) {
                                    skipCount++;
                                    skippedReasons['INSERT 格式不符']++;
                                    const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                    skippedStatements['INSERT 格式不符'].push({ index: idx + 1, preview });
                                    console.warn(`⏭️  [${idx + 1}/${statements.length}] 無法解析 VALUES:`, preview);
                                    continue;
                                }
                                
                                // 處理每個 VALUES 組
                                let groupSuccessCount = 0;
                                let groupErrorCount = 0;
                                
                                for (const valuesStr of valueGroups) {
                                    // 移除外層括號
                                    const cleanValuesStr = valuesStr.trim().replace(/^\(|\)$/g, '');
                                
                                // 改進的值解析函數，處理包含逗號的字串
                                function parseValues(valuesStr) {
                                    const values = [];
                                    let current = '';
                                    let inString = false;
                                    let stringChar = '';
                                    let parenDepth = 0;
                                    let bracketDepth = 0;
                                    
                                    for (let i = 0; i < valuesStr.length; i++) {
                                        const char = valuesStr[i];
                                        const nextChar = valuesStr[i + 1];
                                        
                                        if (!inString && (char === "'" || char === '"')) {
                                            inString = true;
                                            stringChar = char;
                                            current += char;
                                        } else if (inString && char === stringChar) {
                                            if (nextChar === stringChar) {
                                                // 轉義的引號
                                                current += char + nextChar;
                                                i++; // 跳過下一個字元
                                            } else {
                                                // 字串結束
                                                inString = false;
                                                stringChar = '';
                                                current += char;
                                            }
                                        } else if (!inString && char === '(') {
                                            parenDepth++;
                                            current += char;
                                        } else if (!inString && char === ')') {
                                            parenDepth--;
                                            current += char;
                                        } else if (!inString && char === '[') {
                                            bracketDepth++;
                                            current += char;
                                        } else if (!inString && char === ']') {
                                            bracketDepth--;
                                            current += char;
                                        } else if (!inString && parenDepth === 0 && bracketDepth === 0 && char === ',') {
                                            // 值分隔符
                                            values.push(current.trim());
                                            current = '';
                                        } else {
                                            current += char;
                                        }
                                    }
                                    
                                    // 添加最後一個值
                                    if (current.trim()) {
                                        values.push(current.trim());
                                    }
                                    
                                    return values;
                                }
                                
                                    // 解析值
                                    const rawValues = parseValues(cleanValuesStr);
                                    
                                    // 處理每個值
                                    const values = rawValues.map(v => {
                                        v = v.trim();
                                        if (!v || v === 'NULL' || v === 'null') return null;

                                        // 移除 PostgreSQL 型別轉換（例如 ::jsonb）
                                        v = v.replace(/::[a-z_][a-z0-9_]*(?:\[\])?$/i, '').trim();

                                        if (/^ARRAY\[/i.test(v) && v.endsWith(']')) {
                                            return normalizePostgresArrayValue(v);
                                        }
                                        
                                        // 處理字串值
                                        if ((v.startsWith("'") && v.endsWith("'")) || (v.startsWith('"') && v.endsWith('"'))) {
                                            const decoded = v.slice(1, -1)
                                                .replace(/''/g, "'")
                                                .replace(/""/g, '"')
                                                .replace(/\\'/g, "'")
                                                .replace(/\\"/g, '"')
                                                .replace(/\\n/g, '\n')
                                                .replace(/\\t/g, '\t')
                                                .replace(/\\\\/g, '\\');
                                            if ((decoded.startsWith('{') && decoded.endsWith('}')) ||
                                                (decoded.startsWith('[') && decoded.endsWith(']'))) {
                                                try {
                                                    return JSON.parse(decoded);
                                                } catch {
                                                    // 非 JSON 字串維持原值
                                                }
                                            }
                                            return decoded;
                                        }
                                        
                                        // 處理布林值
                                        if (v.toUpperCase() === 'TRUE' || v.toUpperCase() === 'FALSE') {
                                            return v.toUpperCase() === 'TRUE';
                                        }
                                        
                                        // 處理數字
                                        if (/^-?\d+$/.test(v)) {
                                            return parseInt(v, 10);
                                        }
                                        if (/^-?\d*\.\d+$/.test(v)) {
                                            return parseFloat(v);
                                        }
                                        
                                        // 處理 JSON/陣列（如 PostgreSQL 的 ARRAY）
                                        if (v.startsWith('{') && v.endsWith('}')) {
                                            try {
                                                return JSON.parse(v);
                                            } catch (e) {
                                                return v; // 如果無法解析，返回原始值
                                            }
                                        }
                                        
                                        // 其他情況返回原始值
                                        return v;
                                    });
                                    
                                    // 建立記錄物件
                                    const record = {};
                                    columns.forEach((col, colIdx) => {
                                        if (colIdx < values.length) {
                                            record[col] = values[colIdx];
                                        } else {
                                            record[col] = null;
                                        }
                                    });
                                    
                                    // 嘗試插入記錄（使用 put 而不是 add，以處理主鍵衝突）
                                    try {
                                        const transaction = db.transaction([tableName], 'readwrite');
                                        const store = transaction.objectStore(tableName);
                                        
                                        // 先檢查是否有主鍵
                                        const keyPath = store.keyPath;
                                        let shouldUsePut = false;
                                        
                                        if (keyPath && record[keyPath] !== undefined) {
                                            // 有主鍵，使用 put（會覆蓋已存在的記錄）
                                            shouldUsePut = true;
                                        }
                                        
                                        await new Promise((resolve, reject) => {
                                            const request = shouldUsePut ? store.put(record) : store.add(record);
                                            request.onsuccess = () => resolve();
                                            request.onerror = (e) => {
                                                const error = request.error;
                                                // 如果是主鍵衝突且使用 add，嘗試改用 put
                                                if (!shouldUsePut && error.name === 'ConstraintError') {
                                                    const putRequest = store.put(record);
                                                    putRequest.onsuccess = () => resolve();
                                                    putRequest.onerror = () => reject(putRequest.error);
                                                } else {
                                                    reject(error);
                                                }
                                            };
                                        });
                                        
                                        groupSuccessCount++;
                                        successCount++;
                                        if (successCount % 100 === 0) {
                                            console.log(`✅ 已處理 ${successCount} 條記錄...`);
                                        }
                                    } catch (insertError) {
                                        groupErrorCount++;
                                        // 插入失敗，記錄錯誤但繼續處理下一條
                                        skipCount++;
                                        skippedReasons['執行錯誤']++;
                                        const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                        skippedStatements['執行錯誤'].push({ 
                                            index: idx + 1, 
                                            preview, 
                                            error: `${insertError.name}: ${insertError.message}` 
                                        });
                                        console.warn(`⚠️  [${idx + 1}/${statements.length}] 插入失敗 (${tableName}):`, insertError.message);
                                    }
                                }
                                
                                // 如果有多個值組，記錄處理結果
                                if (valueGroups.length > 1 && groupErrorCount > 0) {
                                    console.log(`   → 此語句包含 ${valueGroups.length} 個值組，成功 ${groupSuccessCount} 個，失敗 ${groupErrorCount} 個`);
                                }
                            } else {
                                skipCount++;
                                skippedReasons['INSERT 格式不符']++;
                                const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                                skippedStatements['INSERT 格式不符'].push({ index: idx + 1, preview });
                                console.warn(`⏭️  [${idx + 1}/${statements.length}] INSERT 語句格式不符，已跳過:`, preview);
                            }
                        } else {
                            // 不是 INSERT 語句，跳過
                            skipCount++;
                            skippedReasons['其他']++;
                            const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                            skippedStatements['其他'].push({ index: idx + 1, preview });
                            console.log(`⏭️  [${idx + 1}/${statements.length}] 跳過非 INSERT 語句:`, preview);
                        }
                    } catch (err) {
                        skipCount++;
                        skippedReasons['執行錯誤']++;
                        const preview = trimmed.substring(0, 200).replace(/\s+/g, ' ');
                        skippedStatements['執行錯誤'].push({ index: idx + 1, preview, error: err.message });
                        console.error(`❌ [${idx + 1}/${statements.length}] 執行語句時出錯，已跳過:`, preview, '錯誤:', err.message);
                    }
                }
                
                // 生成跳過原因摘要
                const skipDetails = Object.entries(skippedReasons)
                    .filter(([_, count]) => count > 0)
                    .map(([reason, count]) => `${reason}: ${count}`)
                    .join(', ');
                
                console.log(`\n📊 ========== 載入完成統計 ==========`);
                console.log(`✅ 成功: ${successCount} 條`);
                console.log(`⏭️  跳過: ${skipCount} 條`);
                console.log(`📈 總計: ${statements.length} 條 SQL 語句`);
                console.log(`📉 成功率: ${((successCount / statements.length) * 100).toFixed(2)}%`);
                
                if (skipCount > 0) {
                    console.log(`\n📋 跳過原因統計:`);
                    Object.entries(skippedReasons)
                        .filter(([_, count]) => count > 0)
                        .forEach(([reason, count]) => {
                            console.log(`   ${reason}: ${count} 條`);
                        });
                    
                    console.log(`\n🔍 詳細跳過資訊（展開查看）:`);
                    Object.entries(skippedStatements)
                        .filter(([_, items]) => items.length > 0)
                        .forEach(([reason, items]) => {
                            console.group(`⏭️  ${reason} (${items.length} 條)`);
                            items.forEach((item, i) => {
                                console.log(`   [${item.index}] ${item.preview}${item.error ? ` | 錯誤: ${item.error}` : ''}`);
                            });
                            console.groupEnd();
                        });
                }
                console.log(`========================================\n`);

                await verifyImportedManifest(manifest);
                let checksum = null;
                if (window.crypto?.subtle) {
                    const digest = await window.crypto.subtle.digest(
                        'SHA-256',
                        new TextEncoder().encode(text)
                    );
                    checksum = Array.from(new Uint8Array(digest))
                        .map(byte => byte.toString(16).padStart(2, '0'))
                        .join('');
                }
                localStorage.setItem('eswake-offline-active-db', stagingDatabaseName);
                localStorage.setItem('eswake-offline-backup-meta', JSON.stringify({
                    backupTime: manifest.backupTime,

                    formatVersion: manifest.formatVersion,
                    checksum
                }));
                importActivated = true;
                if (previousDatabaseName !== stagingDatabaseName) {
                    await deleteOfflineDatabase(previousDatabaseName);
                }
                
                let alertMessage = `✅ 備份已驗證並載入！\n備份時間: ${manifest.backupTime}\n資料: ${manifest.totalRecords} 筆`;
                if (checksum) alertMessage += `\nSHA-256: ${checksum.slice(0, 16)}…`;
                if (skipCount > 0) {
                    alertMessage += `\n跳過: ${skipCount} 條\n\n跳過原因：\n${Object.entries(skippedReasons).filter(([_, count]) => count > 0).map(([reason, count]) => `  • ${reason}: ${count}`).join('\n')}`;
                }
                showAlert(alertMessage, 'success');
                
                // 重置文件輸入框，以便可以再次選擇同一個文件

        function normalizeOfflineBookingBoatName(value) {
            return String(value || '').trim().toLocaleLowerCase();

        function splitOfflineBookingNames(value) {
            return String(value || '')
                .split(/[,、/]/)
                .map(name => name.trim())

        function buildPendingOfflineBookings(records, boats, coaches, selectedDate) {
            return (records || [])
                .filter(record =>
                    record &&
                    record.status !== 'completed' &&
                    record.booking_date === selectedDate
                )
                .map(record => {
                    const boatName = normalizeOfflineBookingBoatName(record.boat_name);
                    const boat = (boats || []).find(item =>
                        normalizeOfflineBookingBoatName(item && item.name) === boatName
                    );
                    if (!boat || !record.start_time || !Number(record.duration_min)) return null;

                    const matchedCoaches = splitOfflineBookingNames(record.coach_name)
                        .map(name =>
                            (coaches || []).find(coach => coach && coach.name === name) ||
                            { id: `offline-coach:${name}`, name }
                        );

                    return {
                        id: `offline:${record.id}`,
                        offline_change_id: record.id,
                        is_offline_pending: true,
                        status: 'confirmed',
                        start_at: `${record.booking_date}T${record.start_time}:00`,
                        duration_min: Number(record.duration_min),
                        boat_id: boat.id,
                        boats: boat,
                        contact_name: record.contact_name || '未填姓名',
                        contact_phone: record.phone || '',
                        notes: record.notes || '',
                        schedule_notes: record.activity_types ? `活動：${record.activity_types}` : '',
                        coaches: matchedCoaches,
                        drivers: [],
                        booking_members: []
                    };
                })
                .filter(Boolean);
        }

        function bookingRangesOverlap(startTimeA, durationA, startTimeB, durationB) {
            const startA = timeToMinutes(startTimeA);
            const startB = timeToMinutes(startTimeB);
            const endA = startA + Number(durationA || 0);
            const endB = startB + Number(durationB || 0);
            return startA < endB && startB < endA;
        }

        async function addOfflineChange(event) {
            event.preventDefault();
            const bookingDate = document.getElementById('offline-booking-date').value;
            const startTime = document.getElementById('offline-booking-time').value;
            const durationMin = Number(document.getElementById('offline-booking-duration').value);
            const boatName = document.getElementById('offline-booking-boat').value.trim();
            const contactName = document.getElementById('offline-booking-contact').value.trim();
            const phone = document.getElementById('offline-booking-phone').value.trim();
            const coachName = document.getElementById('offline-booking-coach').value.trim();
            const activityTypes = document.getElementById('offline-booking-activity').value.trim();
            const operator = document.getElementById('offline-change-operator').value.trim();
            const notes = document.getElementById('offline-booking-notes').value.trim();
            if (!bookingDate || !startTime || !durationMin || !boatName || !contactName || !operator) return;

            const records = loadOfflineChangeJournal();
            const boats = await safeGetAllFromStore('boats');
            const selectedBoat = boats.find(boat =>
                normalizeOfflineBookingBoatName(boat && boat.name) === normalizeOfflineBookingBoatName(boatName)
            );
            if (!selectedBoat) {
                alert('找不到這個船隻／場地，請重新選擇。');
                return;
            }

            const backupBookings = await safeGetAllFromStore('bookings');
            const overlapsBackup = backupBookings.some(booking =>
                booking &&
                booking.status === 'confirmed' &&
                booking.start_at &&
                booking.boat_id === selectedBoat.id &&
                parseDbTime(booking.start_at).date === bookingDate &&
                bookingRangesOverlap(
                    startTime,
                    durationMin,
                    parseDbTime(booking.start_at).time,
                    booking.duration_min
                )
            );
            const overlapsPending = records.some(record =>
                record &&
                record.status !== 'completed' &&
                record.booking_date === bookingDate &&
                normalizeOfflineBookingBoatName(record.boat_name) === normalizeOfflineBookingBoatName(boatName) &&
                bookingRangesOverlap(startTime, durationMin, record.start_time, record.duration_min)
            );
            if ((overlapsBackup || overlapsPending) &&
                !confirm('這個船隻／場地在所選時段已有預約。仍要新增離線待補登預約嗎？')) {
                return;
            }

            records.push({
                id: makeOfflineChangeId(),
                created_at: new Date().toISOString(),
                type: '預約',
                operator,
                booking_date: bookingDate,
                start_time: startTime,
                duration_min: durationMin,
                boat_name: boatName,
                contact_name: contactName,
                phone,
                coach_name: coachName,
                activity_types: activityTypes,
                notes,
                subject: `${contactName} ${bookingDate} ${startTime} ${boatName}`,
                details: [
                    `${bookingDate} ${startTime} · ${durationMin}分 · ${boatName}`,
                    `預約人：${contactName}${phone ? ` · ${phone}` : ''}`,
                    coachName ? `教練：${coachName}` : '',
                    activityTypes ? `活動：${activityTypes}` : '',
                    notes ? `備註：${notes}` : ''
                ].filter(Boolean).join('\n'),
                status: 'pending',
                completed_at: null
            });
            if (!saveOfflineChangeJournal(records)) return;
            await showCoachDailyView(bookingDate);
        }

        function toggleOfflineChangeCompleted(id) {
            const records = loadOfflineChangeJournal();
            const record = records.find(item => item.id === id);
            if (!record) return;
            const completing = record.status !== 'completed';
            if (completing && !confirm('確認這筆異動已經補登到線上系統？')) return;
            record.status = completing ? 'completed' : 'pending';
            record.completed_at = completing ? new Date().toISOString() : null;
            if (saveOfflineChangeJournal(records)) renderOfflineChangeJournalList();
        }

        function renderOfflineChangeJournalList() {
            const container = document.getElementById('offline-change-list');
            const summary = document.getElementById('offline-change-summary');
            if (!container || !summary) return;
            const records = loadOfflineChangeJournal()
                .slice()
                .sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));
            const pendingCount = records.filter(item => item.status !== 'completed').length;
            const filter = document.getElementById('offline-change-filter')?.value || 'pending';
            const visible = records.filter(item =>
                filter === 'all' ||
                (filter === 'completed' ? item.status === 'completed' : item.status !== 'completed')
            );
            summary.innerHTML = `待補登 <strong>${pendingCount}</strong> 筆 · 全部 ${records.length} 筆`;

            if (visible.length === 0) {

        function recoveryDisplayValue(value) {
            if (value == null || value === '') return '—';
            if (Array.isArray(value)) return value.map(recoveryDisplayValue).join('、');
            if (typeof value === 'object') return JSON.stringify(value);
            if (typeof value === 'boolean') return value ? '是' : '否';
            return String(value);
        }

        function recoverySortValue(row) {
            return String(
                row.updated_at || row.created_at || row.reported_at ||
                row.start_at || row.start_date || row.transaction_date || row.id || ''
            );
        }

        function recoveryRecordTitle(row, tableName) {
            if (tableName === 'audit_log') {
                return [row.action, row.table_name, row.record_id].filter(Boolean).join(' · ') || '異動記錄';
            }
            if (tableName === 'backup_logs') {
                return [row.backup_type, row.status].filter(Boolean).join(' · ') || '備份記錄';
            }
            if (tableName === 'shop_orders') {
                return row.order_no || row.customer_name || `訂單 ${row.id || ''}`;
            }
            return row.nickname || row.name || row.participant_name || row.title ||
                row.setting_key || row.reason || row.file_name || `記錄 ${row.id ?? '—'}`;
        }

        function dateFallsInRange(date, row) {
            const start = String(row.start_date || row.date || row.restriction_date || '').slice(0, 10);
            const end = String(row.end_date || row.date || row.restriction_date || start).slice(0, 10);
            return (!start || date >= start) && (!end || date <= end);
        }

        function formatRestrictionTimeWindow(row) {
            const startDate = String(row.start_date || '').slice(0, 10);
            const endDate = String(row.end_date || startDate).slice(0, 10);
            const startTime = String(row.start_time || '').slice(0, 5);
            const endTime = String(row.end_time || '').slice(0, 5);
            if (!startTime && !endTime) {
                return startDate && endDate && startDate !== endDate
                    ? `${startDate} → ${endDate} · 全天`
                    : '全天';
            }
            const timeRange = `${startTime || '00:00'}–${endTime || '24:00'}`;
            return startDate && endDate && startDate !== endDate
                ? `${startDate} ${startTime || '00:00'} → ${endDate} ${endTime || '24:00'}`
                : timeRange;
        }

        // 載入並顯示預約
        async function loadAndDisplayBookings(dateParam) {
            try {
                if (!db) await initDatabase();
                
                const selectedDate = dateParam || currentDate;
                currentDate = selectedDate;
                
                // 載入船隻
                const boats = await getAllFromStore('boats');
                
                // 載入教練
                const coaches = await getAllFromStore('coaches');
                const activeCoaches = coaches.filter(c => c.status === 'active');
                
                // 載入指定日期的預約
                const startOfDay = `${selectedDate}T00:00:00`;
                const endOfDay = `${selectedDate}T23:59:59`;
                
                const allBookings = await getAllFromStore('bookings');
                const dateBookings = allBookings.filter(b => {
                    if (b.status !== 'confirmed') return false;
                    const startAt = b.start_at;
                    return startAt >= startOfDay && startAt <= endOfDay;
                }).sort((a, b) => a.start_at.localeCompare(b.start_at));
                const pendingOfflineBookings = buildPendingOfflineBookings(
                    loadOfflineChangeJournal(),
                    boats,
                    activeCoaches,
                    selectedDate
                );
                
                // 載入關聯資料
                const bookingIds = dateBookings.map(b => b.id);
                const bookingCoaches = await getBookingCoaches(bookingIds);
                const bookingDrivers = await getBookingDrivers(bookingIds);
                const bookingMembers = await getBookingMembers(bookingIds);
                
                // 組合資料
                let bookingsWithDetails = dateBookings.map(booking => {
                    const boat = boats.find(b => b.id === booking.boat_id);
                    const coaches = bookingCoaches.filter(bc => bc.booking_id === booking.id)
                        .map(bc => activeCoaches.find(c => c.id === bc.coach_id))
                        .filter(Boolean);
                    const drivers = bookingDrivers.filter(bd => bd.booking_id === booking.id)
                        .map(bd => activeCoaches.find(c => c.id === bd.driver_id))
                        .filter(Boolean);
                    const members = bookingMembers.filter(bm => bm.booking_id === booking.id)
                        .map(bm => {
                            const member = bm.members || null;
                            return member ? { member_id: bm.member_id, members: member } : null;
                        })
                        .filter(Boolean);
                    
                    return {
                        ...booking,
                        boats: boat || null,
                        coaches: coaches,
                        drivers: drivers,
                        booking_members: members
                    };
                });
                bookingsWithDetails = bookingsWithDetails
                    .concat(pendingOfflineBookings)
                    .sort((a, b) => a.start_at.localeCompare(b.start_at));
                
                // 篩選教練
                if (selectedCoachId) {
                    bookingsWithDetails = bookingsWithDetails.filter(booking => {
                        const isCoach = booking.coaches?.some(c => c.id === selectedCoachId);
                        const isDriver = booking.drivers?.some(d => d.id === selectedCoachId);
                        return isCoach || isDriver;
                    });
                }
                
                // 排序船隻（與線上版本一致）
                const boatOrder = ['G23', 'G21', '黑豹', '粉紅', '200', '彈簧床'];
                const sortedBoats = boats.sort((a, b) => {
                    const indexA = boatOrder.indexOf(a.name);
                    const indexB = boatOrder.indexOf(b.name);
                    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
                });
                
                // 生成時間槽（每15分鐘一個）
                const timeSlots = generateTimeSlots();
                
                // 過濾時間槽（顯示有預約的時間範圍）
                const filteredTimeSlots = filterTimeSlots(timeSlots, bookingsWithDetails);

                const timeOffRows = await getCoachTimeOffForDate(selectedDate);
                const staffData = buildDailyStaffForDate(activeCoaches, selectedDate, timeOffRows);
                
                // 渲染頁面
                renderCoachDailyView({
                    boats: sortedBoats,
                    coaches: activeCoaches,
                    bookings: bookingsWithDetails,
                    timeSlots: filteredTimeSlots,
                    date: selectedDate,
                    staffData: staffData,
                });
                
            } catch (error) {
                console.error('載入預約失敗:', error);
                document.getElementById('coach-daily-content').innerHTML = `
                    <div class="alert alert-error">
                        ❌ 載入失敗: ${error.message}
                    </div>
                `;
            }
        }

        // ==================== 教練休假 / 每日人員顯示（對齊 src/utils/coachTimeOff.ts、dailyStaffDisplay.ts） ====================

        var COACH_TIME_OFF_MINUTES_PER_DAY = 24 * 60;
        var WORKING_DISPLAY_HIDDEN_NAME_PARTS = ['火隆', '侑曄'];
        var TIMEOFF_DISPLAY_HIDDEN_NAME_PARTS = ['義揚', '許書源'];

        function dailyStaff_nameMatchesAny(name, parts) {
            return parts.some(function(part) { return name.indexOf(part) !== -1; });
        }

        function isHiddenFromWorkingStaffDisplay(name) {
            return dailyStaff_nameMatchesAny(name, WORKING_DISPLAY_HIDDEN_NAME_PARTS);
        }

        function isHiddenFromTimeOffStaffDisplay(name) {
            return dailyStaff_nameMatchesAny(name, TIMEOFF_DISPLAY_HIDDEN_NAME_PARTS);
        }

        function coachTimeOff_isFullDay(row) {
            return !row.start_time && !row.end_time;
        }

        function coachTimeOff_parseTimeToMinutes(time) {
            if (!time) return null;
            var p = String(time).split(':').map(Number);
            if (isNaN(p[0]) || isNaN(p[1])) return null;
            return p[0] * 60 + p[1];
        }

        function coachTimeOff_getDayBlock(row, targetDate) {
            if (targetDate < row.start_date || targetDate > row.end_date) return null;
            if (coachTimeOff_isFullDay(row)) {
                return { startMin: 0, endMin: COACH_TIME_OFF_MINUTES_PER_DAY };
            }
            var startMin = 0;
            var endMin = COACH_TIME_OFF_MINUTES_PER_DAY;
            if (row.start_date === targetDate && row.start_time) {
                startMin = coachTimeOff_parseTimeToMinutes(row.start_time) || 0;
            }
            if (row.end_date === targetDate && row.end_time) {
                endMin = coachTimeOff_parseTimeToMinutes(row.end_time) || COACH_TIME_OFF_MINUTES_PER_DAY;
            }
            if (startMin >= endMin) return null;
            return { startMin: startMin, endMin: endMin };
        }

        function coachTimeOff_isMorningPreset(row) {
            return row.start_date === row.end_date
                && (!row.start_time || row.start_time === '00:00')
                && row.end_time === '12:00';
        }

        function coachTimeOff_isAfternoonPreset(row) {
            return row.start_date === row.end_date
                && row.start_time === '12:00'
                && !row.end_time;
        }

        function coachTimeOff_isCoachFullyOffOnDate(rows, targetDate) {
            var blocks = rows.map(function(r) { return coachTimeOff_getDayBlock(r, targetDate); })
                .filter(function(b) { return b !== null; });
            if (blocks.length === 0) return false;
            return blocks.some(function(b) { return b.startMin === 0 && b.endMin === COACH_TIME_OFF_MINUTES_PER_DAY; });
        }

        function coachTimeOff_hasAnyTimeOffOnDate(rows, targetDate) {
            return rows.some(function(r) { return coachTimeOff_getDayBlock(r, targetDate) !== null; });
        }

        function coachTimeOff_formatTimeHm(time) {
            if (!time) return '';
            var p = time.split(':');
            return parseInt(p[0], 10) + ':' + p[1];
        }

        function coachTimeOff_formatPeriodLabel(row, targetDate) {
            var block = coachTimeOff_getDayBlock(row, targetDate);
            if (!block) return '';
            if (block.startMin === 0 && block.endMin === COACH_TIME_OFF_MINUTES_PER_DAY) return '';
            if (coachTimeOff_isMorningPreset(row) && row.start_date === targetDate) return '上午';
            if (coachTimeOff_isAfternoonPreset(row) && row.start_date === targetDate) return '下午';
            var startLabel = block.startMin === 0 ? '' : coachTimeOff_formatTimeHm(row.start_time);
            var endLabel = block.endMin === COACH_TIME_OFF_MINUTES_PER_DAY ? '' : coachTimeOff_formatTimeHm(row.end_time);
            if (startLabel && endLabel) return startLabel + '–' + endLabel;
            if (startLabel) return startLabel + '起';
            if (endLabel) return '–' + endLabel;
            return '';
        }

        function coachTimeOff_formatStaffBadgeLabel(name, records, targetDate) {
            var periods = {};
            records.forEach(function(row) {
                var period = coachTimeOff_formatPeriodLabel(row, targetDate);
                if (period) periods[period] = true;
            });
            var keys = Object.keys(periods);
            if (keys.length === 0) return name;
            return name + '（' + keys.join('、') + '）';
        }

        function coachTimeOff_groupByCoach(rows) {
            var map = {};
            rows.forEach(function(row) {
                if (!map[row.coach_id]) map[row.coach_id] = [];
                map[row.coach_id].push(row);
            });
            return map;
        }

        async function getCoachTimeOffForDate(dateStr) {
            try {
                var all = await getAllFromStore('coach_time_off');
                return all.filter(function(r) {
                    return r.start_date <= dateStr && r.end_date >= dateStr;
                });

                return [];
            }
