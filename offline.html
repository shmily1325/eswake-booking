        // ==================== 明日提醒（與線上版介面功能一致） ====================
        
        // 明日提醒預設日期：凌晨 3 點前算今天，之後算明天
        function getTomorrowDefaultDate() {
            var now = new Date();
            if (getVenueTimeParts(now).hours < 3) {
                return getVenueDateString(now);
            }
            return addDaysToDateStr(getVenueDateString(now), 1);
        }
        
        // 載入指定日期的預約（排除教練練習），並組合教練/駕駛/會員，更新 contact_name
        async function loadTomorrowBookings(selectedDate) {
            if (!db) await initDatabase();
            var startOfDay = selectedDate + 'T00:00:00';
            var endOfDay = selectedDate + 'T23:59:59';
            var allBookings = await getAllFromStore('bookings').catch(function() { return []; });
            var dateBookings = allBookings.filter(function(b) {
                if (b.is_coach_practice) return false;
                var startAt = b.start_at;
                return startAt >= startOfDay && startAt <= endOfDay;
            }).sort(function(a, b) { return a.start_at.localeCompare(b.start_at); });
            
            if (dateBookings.length === 0) return [];
            
            var boats = await getAllFromStore('boats').catch(function() { return []; });
            var coaches = await getAllFromStore('coaches').catch(function() { return []; });
            var activeCoaches = coaches;
            var bookingIds = dateBookings.map(function(b) { return b.id; });
            var bookingCoaches = await getBookingCoaches(bookingIds);
            var bookingDrivers = await getBookingDrivers(bookingIds);
            var bookingMembers = await getBookingMembers(bookingIds);
            
            return dateBookings.map(function(booking) {
                var boat = boats.find(function(b) { return b.id === booking.boat_id; }) || null;
                var coachesForBooking = bookingCoaches.filter(function(bc) { return bc.booking_id === booking.id; })
                    .map(function(bc) { return activeCoaches.find(function(c) { return c.id === bc.coach_id; }); })
                    .filter(Boolean);
                var driversForBooking = bookingDrivers.filter(function(bd) { return bd.booking_id === booking.id; })
                    .map(function(bd) { return activeCoaches.find(function(c) { return c.id === bd.driver_id; }); })
                    .filter(Boolean);
                var membersForBooking = bookingMembers.filter(function(bm) { return bm.booking_id === booking.id; })
                    .map(function(bm) { return bm.members ? { id: bm.member_id, name: bm.members.name, nickname: bm.members.nickname } : null; })
                    .filter(Boolean);
                
                var contactName = booking.contact_name || '';
                if (membersForBooking.length > 0) {
                    var originalNames = contactName.split(',').map(function(n) { return n.trim(); });
                    if (membersForBooking.length === originalNames.length) {
                        contactName = membersForBooking.map(function(m) { return m.nickname || m.name; }).join(', ');
                    } else {
                        var updatedNames = [];
                        var processed = {};
                        originalNames.forEach(function(name) {
                            var matched = membersForBooking.find(function(m) {
                                if (name === m.name || name === m.nickname) return true;
                                var parts = name.split('/').map(function(p) { return p.trim(); });
                                return parts.some(function(part) { return part === m.name || part === m.nickname; });
                            });
                            if (matched && !processed[matched.id]) {
                                updatedNames.push(matched.nickname || matched.name);
                                processed[matched.id] = true;
                            } else if (!matched) {
                                updatedNames.push(name);
                            }
                        });
                        membersForBooking.forEach(function(m) {
                            if (!processed[m.id]) updatedNames.push(m.nickname || m.name);
                        });
                        if (updatedNames.length > 0) contactName = updatedNames.join(', ');
                    }
                }
                
                return {
                    id: booking.id,
                    boat_id: booking.boat_id,
                    contact_name: contactName,
                    start_at: booking.start_at,
                    duration_min: booking.duration_min,
                    activity_types: booking.activity_types,
                    notes: booking.notes,
                    boats: boat,
                    coaches: coachesForBooking,
                    drivers: driversForBooking
                };
            });
        }
        
        function formatTimeNoColon(dateString) {
            var datetime = (dateString || '').substring(0, 16);
            var parts = datetime.split('T');
            if (parts.length !== 2) return '';
            var timeStr = parts[1];
            var hm = timeStr.split(':');
            return (hm[0] || '00') + (hm[1] || '00');
        }
        
        function getArrivalTimeNoColon(dateString) {
            var datetime = (dateString || '').substring(0, 16);
            var parts = datetime.split('T');
            if (parts.length !== 2) return '';
            var hm = parts[1].split(':').map(Number);
            var totalMinutes = (hm[0] || 0) * 60 + (hm[1] || 0) - 30;
            var h = Math.floor(totalMinutes / 60);
            var m = totalMinutes % 60;
            return String(h).padStart(2, '0') + String(m).padStart(2, '0');
        }

        function getArrivalTimeWithColon(dateString) {
            var raw = getArrivalTimeNoColon(dateString);
            if (raw.length !== 4) return raw;
            return raw.slice(0, 2) + ':' + raw.slice(2, 4);
        }
        
        var SPECIAL_MEMBERS_FOR_BOAT_INFO = ['Mandy', '火腿', '火小', '火隆', '火龍'];
        var SAFIN_TOMORROW_STUDENT_NAMES = { 'Safin': 1 };

        var QIQI_TOMORROW_STUDENT_NAME = 'EHA綺';
        /** 僅名單為 EHA綺 + 教練 ED 時替換；其餘原樣回傳 */
        function _isQiqiEd(studentName, coachName) {
            return studentName === QIQI_TOMORROW_STUDENT_NAME
                && (coachName || '').trim().toUpperCase() === 'ED';
        }
        /** UI 用（單行） */
        function displayCoachNameForTomorrowReminder(studentName, coachName) {
            if (!_isQiqiEd(studentName, coachName)) return coachName;
            return 'Ebdooooooooooooooooooooooooooooooopq';
        }
        /** 純文字 LINE 訊息用（多行 ASCII，結尾 \n 讓「教練」獨立一行） */
        function displayCoachNameForTomorrowMessage(studentName, coachName) {
            if (!_isQiqiEd(studentName, coachName)) return coachName;
            return '　　　　Ｅ\n　　ｂ　　　ｄ\n　　　ｏｏｏ　\n　　ｏｏｏｏｏ\n　ｏｏｏｏｏｏｏ\n　ｏｏｏｏｏｏｏ\n　　ｏｏｏｏｏ\n　　　ｏｏｏ　\n　　ｐ　　　ｑ\n';
        }

        function getFacilityMessageLabelOffline(boatName) {
            if (boatName === '彈簧床') return '彈簧床';
            if (boatName === '陸上課程') return '陸上課程';
            return '';
        }

        var TOMORROW_COACH_REMINDER_TARGET_COACHES = ['火隆', '侑曄'];
        function getCoachTomorrowReminderLines(coachName, bookings) {
            var seen = {};
            return bookings
                .filter(function(b) {
                    return (b.coaches || []).some(function(c) { return String(c.name || '').trim() === coachName.trim(); });
                })
                .sort(function(a, b) { return a.start_at.localeCompare(b.start_at); })
                .filter(function(b) {
                    var key = b.id != null ? 'id:' + b.id : [b.start_at, b.boats?.name || '', b.duration_min || ''].join('\u001f');
                    if (seen[key]) return false;
                    seen[key] = true;
                    return true;
                })
                .map(function(b) {
                    var names = String(b.contact_name || '').split(',').map(function(n) { return n.trim(); }).filter(Boolean);
                    var namePart = names.length ? names.join(', ') : '（未填預約人）';
                    var time = formatTimeNoColon(b.start_at) || '----';
                    var facility = getFacilityMessageLabelOffline(b.boats?.name || '');
                    var segment = facility === '陸上課程'
                        ? time + '陸上訓練'
                        : facility === '彈簧床'
                            ? time + '彈簧床'
                            : time + '下水(' + (b.boats?.name || '—') + ')';
                    return namePart + ' ' + segment;
                });
        }
        
        function generateTomorrowMessageForStudent(studentName, bookings, includeWeatherWarning, weatherWarning, footerText) {
            var studentBookings = bookings.filter(function(b) {
                var names = (b.contact_name || '').split(',').map(function(n) { return n.trim(); });
                return names.indexOf(studentName) !== -1;
            }).sort(function(a, b) { return a.start_at.localeCompare(b.start_at); });
            
            if (SAFIN_TOMORROW_STUDENT_NAMES[studentName] && studentBookings.length > 0) {
                var safinLines = ['你好李伯'];
                studentBookings.forEach(function(booking) {
                    safinLines.push('明天有預約，請 ' + getArrivalTimeWithColon(booking.start_at) + ' 抵達');
                });
                return safinLines.join('\n');
            }
            
            var hasPapaCoach = studentBookings.some(function(b) {
                return (b.coaches || []).some(function(c) { return (c.name || '').toUpperCase() === 'PAPA'; });
            });
            
            var message = studentName + '你好\n提醒你，明天有預約\n';
            if (hasPapaCoach) message += '請幫我帶現金直接給Papa\n';
            message += '\n';
            
            if (SPECIAL_MEMBERS_FOR_BOAT_INFO.indexOf(studentName) !== -1 && studentBookings.length > 0) {
                var first = studentBookings[0];
                var boatName = first.boats && first.boats.name ? first.boats.name : '';
                var driverNames = (first.drivers && first.drivers.length > 0)
                    ? first.drivers.map(function(d) { return d.name; }).join('/')
                    : (first.coaches && first.coaches.length > 0 ? first.coaches.map(function(c) { return c.name; }).join('/') : '');
                if (boatName) {
                    if (driverNames) message += '船：' + boatName + ' / 開船：' + driverNames + '\n';
                    else message += '船：' + boatName + '\n';
                }
            }
            
            var previousCoachNames = '';
            var boatCount = 0;
            studentBookings.forEach(function(booking, index) {
                var hasCoach = booking.coaches && booking.coaches.length > 0;
                var coachNames = hasCoach
                    ? booking.coaches.map(function(c) { return displayCoachNameForTomorrowMessage(studentName, c.name); }).join('/')
                    : '';
                var startTime = formatTimeNoColon(booking.start_at);
                var boatName = (booking.boats && booking.boats.name) || '';
                var facilityLabel = getFacilityMessageLabelOffline(boatName);
                var isFacility = !!facilityLabel;
                if (!isFacility) boatCount++;
                
                if (index === 0) {
                    if (hasCoach) message += coachNames + '教練\n';
                    message += getArrivalTimeNoColon(booking.start_at) + '抵達\n';
                    message += isFacility ? (startTime + facilityLabel + '\n') : (startTime + '下水\n');
                    previousCoachNames = coachNames;
                } else {
                    if (!isFacility && boatCount >= 2) {
                        var shipLabel = boatCount === 2 ? '第二船' : boatCount === 3 ? '第三船' : '第' + boatCount + '船';
                        message += '\n' + shipLabel + '\n';
                    }
                    if (coachNames === previousCoachNames) {
                        message += isFacility ? (startTime + facilityLabel + '\n') : (startTime + '下水\n');
                    } else {
                        if (hasCoach) message += coachNames + '教練\n';
                        message += isFacility ? (startTime + facilityLabel + '\n') : (startTime + '下水\n');
                        previousCoachNames = coachNames;
                    }
                }
            });
            message += '\n';
            if (includeWeatherWarning) message += weatherWarning + '\n\n';
            message += footerText;
            return message;
        }
        
        var EXCLUDED_FROM_TOMORROW_STUDENT_REMINDERS = { 'Ming': 1 };
        function getTomorrowStudentList(bookings) {
            var students = {};
            bookings.forEach(function(b) {
                (b.contact_name || '').split(',').map(function(n) { return n.trim(); }).forEach(function(name) {
                    if (name) students[name] = true;
                });
            });
            return Object.keys(students).filter(function(n) { return !EXCLUDED_FROM_TOMORROW_STUDENT_REMINDERS[n]; }).sort();
        }

        var tomorrowReminderCopiedStudent = null;

        function generateEnglishTomorrowMessage(studentName, bookings, includeWeatherWarning, template, englishWeatherWarning) {
            var studentBookings = bookings
                .filter(function(booking) {

                })
                .sort(function(a, b) { return String(a.start_at || '').localeCompare(String(b.start_at || '')); });
            var times = Array.from(new Set(studentBookings.map(function(booking) {
                return addMinutesToTimeStr(String(booking.start_at || '').slice(11, 16), -30);
            })));
            var appointment = times.length === 1
                ? 'an appointment tomorrow at ' + times[0]
                : 'appointments tomorrow at ' + times.join(' and ');
            var weather = includeWeatherWarning ? '\n\n' + englishWeatherWarning : '';
            return template
                .split('{username}').join(studentName)
                .split('{appointment}').join(appointment)
                .split('{weather}').join(weather);
        }

        // 檔案選擇事件 - 使用標記避免重複設置
        let fileInputSetup = false;
        let isFileLoading = false; // 防止重複載入
        function setupFileInput() {
            if (fileInputSetup) return; // 避免重複設置
            const fileInput = document.getElementById('sql-file');
            if (fileInput) {
                fileInputSetup = true;
                // 移除舊的事件監聽器（如果有的話）
                const newInput = fileInput.cloneNode(true);
                fileInput.parentNode.replaceChild(newInput, fileInput);
                
                // 添加新的事件監聽器
                newInput.addEventListener('change', function(e) {
                    // 防止重複觸發
                    if (isFileLoading) {
                        console.log('檔案正在載入中，忽略重複觸發');
                        e.target.value = ''; // 清空選擇，避免重複觸發
                        return;
                    }
                    
                    const file = e.target.files?.[0];
                    const fileNameDiv = document.getElementById('file-name');
                    
                    if (file) {
                        console.log('選擇了檔案:', file.name, '大小:', file.size, 'bytes');
                        if (fileNameDiv) {
                            fileNameDiv.textContent = `已選擇: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                            fileNameDiv.style.color = '#365d66';
                        }
                        // loadSQLFile 函數內部會設置 isFileLoading 標記並禁用 input
                        loadSQLFile(file);
                    } else {
                        console.log('未選擇檔案');
                        if (fileNameDiv) {
                            fileNameDiv.textContent = '';
                        }
                    }
                });
                
                // label 的 for 屬性已經足夠觸發 input，不需要額外的點擊事件
                // 但我們需要在載入過程中禁用 label 的點擊
                const label = newInput.closest('label');
                if (label) {
                    // 監聽 label 點擊，在載入過程中阻止
                    label.addEventListener('click', function(e) {
                        if (isFileLoading || newInput.disabled) {
                            e.preventDefault();
                            e.stopPropagation();
                            e.stopImmediatePropagation();
                            console.log('檔案正在載入中，忽略 label 點擊');
                            return false;
                        }
                    }, true); // 使用 capture phase 確保優先處理
                }
                
                console.log('✅ 檔案輸入事件監聽器已設置');
            } else {
                console.warn('⚠️ 找不到 sql-file 元素，稍後重試');
                setTimeout(setupFileInput, 100);
            }
        }

            const filtered = window.currentMembers.filter(member => {
                const name = (member.name || '').toLowerCase();
                const nickname = (member.nickname || '').toLowerCase();
                const matchesSearch = name.includes(searchTerm) || nickname.includes(searchTerm);
                const today = getVenueDateString();
                const soon = addDaysToDateStr(today, 30);
                const matchesFilter =
                    currentMemberFilter === 'all' ||
                    (currentMemberFilter === 'member' && !['guest', 'es'].includes(member.membership_type)) ||
                    (currentMemberFilter === 'guest' && member.membership_type === 'guest') ||
                    (currentMemberFilter === 'es' && member.membership_type === 'es') ||
                    (currentMemberFilter === 'membership-expiry' && member.membership_end_date && member.membership_end_date.slice(0, 10) <= soon) ||
                    (currentMemberFilter === 'board-expiry' && (member.board_slots || []).some(slot => slot.expires_at && slot.expires_at.slice(0, 10) <= soon)) ||
                    (currentMemberFilter === 'line-bound' && !!member.line_binding) ||
                    (currentMemberFilter === 'line-unbound' && !member.line_binding);
                return matchesSearch && matchesFilter;
            });
            
            memberList.innerHTML = filtered.map(member => renderMemberCard(member)).join('');

                    transactions = await getAllFromStore('transactions');
                } catch (e) {
                    console.warn('無法載入交易記錄:', e);
                }
                
                // 計算每個會員的最後交易日期
                const lastTransactionMap = {};
                transactions.forEach(tx => {
                    if (tx.member_id && !lastTransactionMap[tx.member_id]) {
                        lastTransactionMap[tx.member_id] = {
                            date: tx.transaction_date,
                            createdAt: tx.created_at || tx.transaction_date
                        };
                    }
                });
                
                const membersWithLastTx = activeMembers.map(m => ({
                    ...m,
                    lastTransactionDate: lastTransactionMap[m.id]?.date || null,
                    lastTransactionCreatedAt: lastTransactionMap[m.id]?.createdAt || null,
                    line_binding: lineBindings.find(binding => binding.member_id === m.id && binding.status === 'active') || null
                }));
                
                renderMemberTransactionList(membersWithLastTx);
            } catch (error) {
                console.error('載入會員儲值失敗:', error);

                    content.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">載入失敗，請重新載入資料庫</div>';

            }
        }

                if (!dateB) return -1;

                all: sortedMembers.length,
                member: sortedMembers.filter(member => !['guest', 'es'].includes(member.membership_type)).length,

                es: sortedMembers.filter(member => member.membership_type === 'es').length,

        // 搜尋會員儲值
        function filterMemberTransactions() {
            const searchTerm = document.getElementById('transaction-search')?.value.toLowerCase() || '';
            const memberList = document.getElementById('member-transaction-list');
            if (!memberList || !window.currentTransactionMembers) return;
            
            const filtered = window.currentTransactionMembers.filter(member => {
                const name = (member.name || '').toLowerCase();
                const nickname = (member.nickname || '').toLowerCase();
                const phone = (member.phone || '').toLowerCase();
                const matchesSearch = name.includes(searchTerm) || nickname.includes(searchTerm) || phone.includes(searchTerm);
                const matchesFilter =
                    currentTransactionFilter === 'all' ||
                    (currentTransactionFilter === 'member' && !['guest', 'es'].includes(member.membership_type)) ||
                    (currentTransactionFilter === 'guest' && member.membership_type === 'guest') ||
                    (currentTransactionFilter === 'es' && member.membership_type === 'es') ||
                    (currentTransactionFilter === 'line-bound' && !!member.line_binding) ||
                    (currentTransactionFilter === 'line-unbound' && !member.line_binding);
                return matchesSearch && matchesFilter;
            }).sort((a, b) => currentTransactionSort === 'line'
                ? String(b.line_binding?.last_liff_login_at || '').localeCompare(String(a.line_binding?.last_liff_login_at || ''))

        function renderBoardManagement(boards) {

            // 置板區配置
            const BOARD_SECTIONS = [
                { name: '第1排', start: 1, end: 30 },

        // 渲染置板區塊
        function renderBoardSection(section, slotMap) {
            const slotPairs = [];
            
            if (section.upperOnly) {
                for (let i = section.start; i <= section.end; i++) {
                    slotPairs.push({ upper: i, lower: null });
                }
            } else {
                for (let i = section.start; i <= section.end; i += 2) {
                    const lower = i;
                    const upper = i + 1;
                    slotPairs.push({
                        upper: upper <= section.end ? upper : null,
                        lower: lower <= section.end ? lower : null
                    });
                }
            }
            
            return `
                <div style="margin-bottom: 30px;">
                    <h3 style="margin:0 0 12px;font-size:16px;font-weight:650;color:#333;">
                        ${section.name} (${section.start}-${section.end})
                    </h3>
                    <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div class="offline-board-grid">
                            ${slotPairs.map(pair => `
                                <div style="display: flex; flex-direction: column; gap: 6px;">
                                    ${pair.upper ? renderBoardSlot(pair.upper, slotMap[pair.upper]) : '<div></div>'}
                                    ${pair.lower ? renderBoardSlot(pair.lower, slotMap[pair.lower]) : '<div></div>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染單個置板格位
        function renderBoardSlot(slotNumber, board) {
            const isOccupied = !!board;
            
            // 計算到期狀態
            let expiryStatus = 'empty';
            if (isOccupied && board.expires_at) {
                const today = getVenueDateString();
                const expiryDate = board.expires_at.split('T')[0];
                if (expiryDate < today) expiryStatus = 'expired';
                else if (expiryDate <= addDaysToDateStr(today, 30)) expiryStatus = 'expiring';
                else expiryStatus = 'normal';
            }
            
            // 根據狀態設定顏色
            let slotStyles = {
                background: '#f5f5f5',
                color: '#999',
                border: '2px solid #e0e0e0'
            };
            
            if (expiryStatus === 'expired') {
                slotStyles = {
                    background: '#fbeeed',
                    color: '#c62828',
                    border: '2px solid #ef9a9a'
                };
            } else if (expiryStatus === 'expiring') {
                slotStyles = {
                    background: '#fbf3e5',
                    color: '#e65100',
                    border: '2px solid #ffcc80'
                };
            } else if (expiryStatus === 'normal') {
                slotStyles = {
                    background: '#edf7f1',
                    color: '#2e7d32',
                    border: '2px solid #a5d6a7'
                };
            }
            
            return `
                <div onclick="openBoardSlotDialog(${slotNumber})" style="
                    padding: 8px;
                    background: ${slotStyles.background};
                    color: ${slotStyles.color};
                    border-radius: 6px;
                    cursor: pointer;
                    border: ${slotStyles.border};
                    transition: all 0.2s;
                    height: 90px;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-start;
                    position: relative;
                    overflow: hidden;
                " onmouseenter="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'" 
                   onmouseleave="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                    <div style="font-size: 11px; font-weight: bold; opacity: 0.7; margin-bottom: 3px;">#${slotNumber}</div>
                    ${isOccupied ? `
                        <div style="font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;">
                            ${board.member_nickname || board.member_name || '未知'}
                        </div>
                        ${board.expires_at ? `
                            <div style="font-size: 10px; opacity: 0.85; margin-top: 3px; line-height: 1.2;">
                                📅 ${board.expires_at.split('T')[0]}
                            </div>
                        ` : ''}
                        ${board.notes ? `
                            <div style="font-size: 9px; opacity: 0.9; margin-top: 2px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${board.notes}">
                                📝 ${board.notes.length > 8 ? board.notes.substring(0, 8) + '...' : board.notes}
                            </div>
                        ` : ''}
                    ` : `
                        <div style="font-size: 12px; text-align: center; margin-top: 6px;">空位</div>
                    `}
                </div>
            `;
        }
        
        // 匯出置板
        async function exportBoards() {
            try {
                if (!db) await initDatabase();
                
                const boards = await getAllFromStore('board_storage');
                const activeBoards = boards.filter(b => b.status === 'active');
                
                const members = await getAllFromStore('members');
                const membersMap = {};
                members.forEach(m => {
                    membersMap[m.id] = m;
                });
                
                const headers = ['姓名', '暱稱', '格位號碼', '到期日', '備註'];
                const rows = activeBoards.map(board => {
                    const member = membersMap[board.member_id];
                    return [
                        member?.name || '',
                        member?.nickname || '',
                        board.slot_number,
                        board.expires_at || '',
                        board.notes || ''
                    ];
                });
                
                const csvContent = [
                    headers.join(','),
                    ...rows.map(row => row.map(cell => {
                        const cellStr = String(cell);
                        if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
                            return `"${cellStr.replace(/"/g, '""')}"`;
                        }
                        return cellStr;
                    }).join(','))
                ].join('\n');
                
                const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                const today = getVenueDateString();
                link.download = `置板資料_${today}.csv`;
                link.click();
            } catch (error) {
                console.error('匯出失敗:', error);
                alert('匯出失敗：' + error.message);
            }
        }

        function renderOfflineProducts() {
            const container = document.getElementById('offline-product-content');

            const rows = offlineProductRows.filter(variant => {
                const product = variant.product || {};
                const haystack = [
                    product.brand,
                    product.model,
                    product.category,
                    variant.vendor_code,
                    variant.label_code,
                    formatProductAttributes(variant.attributes)
                ].filter(Boolean).join(' ').toLowerCase();
                return (!category || product.category === category) && (!query || haystack.includes(query));
            });

            const totalStock = rows.reduce((sum, row) => sum + (Number(row.stock) || 0), 0);

            const lowStock = rows.filter(row => variantSellableStock(row) <= 2).length;
            const productGroups = [...rows.reduce((groups, variant) => {
                const key = String(variant.product?.id || variant.product_id || variant.id);

                groups.get(key).push(variant);
                return groups;
            }, new Map()).values()];

            if (offlineProductRows.length === 0) {
                container.innerHTML = `<div style="padding:36px; text-align:center; background:white; border-radius:12px; color:#777;">備份中沒有商品資料，請重新下載最新備份。</div>`;

                    <table style="width:100%; border-collapse:collapse; min-width:900px;">
                        <thead><tr style="background:#f6f6f6; text-align:left;">
                            ${['分類', '商品', '規格', '貨號／標籤', '庫存', '保留', '可售', '供貨狀態', '公開狀態', '商城可售', '售價'].map(label => `<th style="padding:12px; border-bottom:1px solid #ddd;">${label}</th>`).join('')}
                        </tr></thead>
                        <tbody>
                            ${rows.map(variant => {
                                const product = variant.product || {};
                                const sellable = variantSellableStock(variant);
                                const isPublic = product.is_public === true;

                                return `<tr>

                                    <td style="padding:11px; border-bottom:1px solid #eee; font-size:13px;">${escapeHtml(variant.vendor_code || variant.label_code || '—')}</td>
                                    <td style="padding:11px; border-bottom:1px solid #eee;">${Number(variant.stock) || 0}</td>

                    ${rows.map(variant => {

                                <div><div style="font-size:12px;color:var(--es-muted);">${escapeHtml(PRODUCT_CATEGORY_LABELS[product.category] || product.category || '—')}</div><strong>${escapeHtml(product.brand || '—')} ${escapeHtml(product.model || '')}</strong><div style="font-size:13px;color:var(--es-muted);margin-top:4px;">${escapeHtml(formatProductAttributes(variant.attributes))}</div></div>

                        const priceLabel = !prices.length
                            ? '缺價'
                            : prices[0] === prices[prices.length - 1]
                                ? `$${prices[0].toLocaleString()}`
                                : `$${prices[0].toLocaleString()}–${prices[prices.length - 1].toLocaleString()}`;
                        const totalSellable = group.reduce((sum, item) => sum + variantSellableStock(item), 0);

                                <div><div style="font-size:12px;color:var(--es-muted);">${escapeHtml(PRODUCT_CATEGORY_LABELS[product.category] || product.category || '—')}</div><strong>${escapeHtml(product.brand || '—')} ${escapeHtml(product.model || '')}</strong></div>

                            </div>

                    }).join('') || '<div class="es-empty">沒有符合條件的商品</div>'}
                </div>

                            手機：${escapeHtml(member.phone || '未填寫')} · 會籍：${escapeHtml(member.membership_type || '—')}<br>
                            LINE：${binding ? '已綁定' : '未綁定'}
                            ${partner ? `<br>雙人會員配對：${escapeHtml(partner.nickname || partner.name)}` : ''}
                        </div>
                    </section>
                    <section><h3>💰 現行餘額</h3>
                        <div style="display:grid;grid-template-columns:repeat(2,minmax(130px,1fr));gap:8px;background:#f8f9fa;padding:14px;border-radius:8px;">
                            <div>儲值 ${money(member.balance)}</div><div>VIP ${money(member.vip_voucher_amount)}</div>
                            <div>指定課 ${minutes(member.designated_lesson_minutes)}</div><div>G23 ${minutes(member.boat_voucher_g23_minutes)}</div>
                            <div>黑豹/G21 ${minutes(member.boat_voucher_g21_panther_minutes)}</div><div>贈送大船 ${minutes(member.gift_boat_hours)}</div>
                        </div>
                    </section>
                    <section><h3>🏄 置板（依格位排序）</h3>
                        ${memberBoards.length ? memberBoards.map(board => `<div style="padding:8px;border-bottom:1px solid #eee;">#${board.slot_number} · ${escapeHtml(board.start_date || '—')} → ${escapeHtml(board.expires_at || '—')} ${board.status !== 'active' ? '（非現行）' : ''}</div>`).join('') : '<div style="color:#999;">尚無置板</div>'}
                    </section>
                    <section><h3>📝 備忘錄（事件日期排序）</h3>
                        ${memberNotes.length ? memberNotes.map(note => `<div style="padding:8px;border-bottom:1px solid #eee;"><span style="color:#777;">${escapeHtml(note.event_date || '')}</span> ${escapeHtml(note.event_type || '')} · ${escapeHtml(note.description || '')}</div>`).join('') : '<div style="color:#999;">尚無備忘錄</div>'}
                    </section>
                    <section><h3>📊 交易記錄（新到舊）</h3>
                        ${memberTransactions.length ? memberTransactions.map(tx => `<div style="padding:8px;border-bottom:1px solid #eee;">${escapeHtml(tx.transaction_date || '')} · ${escapeHtml(tx.description || tx.category || '')} · ${escapeHtml(tx.adjust_type || '')} ${Number(tx.amount || tx.minutes || 0).toLocaleString()}</div>`).join('') : '<div style="color:#999;">尚無交易</div>'}
                    </section>
                </div>`;
            dialog.classList.add('active');
        }

        function openMemberDetailDialog(memberId) { void showMemberDetailDialog(memberId); }
        function openTransactionDialog(memberId) { void showMemberDetailDialog(memberId); }
        function openOfflineBookingDetail(bookingId) {
            const booking = offlineBookingDetailMap.get(String(bookingId));
            if (!booking) return;
            const startTime = String(booking.start_at || '').replace('T', ' ').slice(0, 16);
            const coaches = (booking.coaches || []).map(item => item?.name).filter(Boolean).join('、') || '未指定';
            const drivers = (booking.drivers || []).map(item => item?.name).filter(Boolean).join('、') || '未指定';
            const activities = normalizePostgresArrayValue(booking.activity_types).join('、') || '未填寫';
            const dialog = document.getElementById('member-detail-dialog');
            const dialogContent = dialog.querySelector('.modal-content');
            dialogContent.innerHTML = `
                <div style="padding:20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;">
                    <h2 style="margin:0;">預約詳情</h2>
                    <button onclick="closeMemberDetailDialog()" style="border:0;background:none;font-size:24px;cursor:pointer;">×</button>
                </div>
                <div style="padding:20px;display:grid;gap:14px;">
                    <div class="es-status info">離線唯讀：可查看完整內容，但不能修改預約。</div>
                    <div class="es-record-grid">
                        <div class="es-record-value"><span>預約人</span>${escapeHtml(getDisplayContactName(booking) || '未命名')}</div>
                        <div class="es-record-value"><span>時間</span>${escapeHtml(startTime)} · ${Number(booking.duration_min || 0)} 分</div>
                        <div class="es-record-value"><span>船隻</span>${escapeHtml(booking.boat?.name || booking.boats?.name || booking.boatName || '未指定')}</div>
                        <div class="es-record-value"><span>活動</span>${escapeHtml(activities)}</div>
                        <div class="es-record-value"><span>教練</span>${escapeHtml(coaches)}</div>
                        <div class="es-record-value"><span>駕駛</span>${escapeHtml(drivers)}</div>
                    </div>
                    ${(booking.notes || booking.schedule_notes) ? `<div class="es-card"><strong>備註</strong><br>${escapeHtml([booking.notes, booking.schedule_notes].filter(Boolean).join(' · '))}</div>` : ''}
                </div>
            `;
            dialog.classList.add('active');
        }
        function closeMemberDetailDialog() {
            document.getElementById('member-detail-dialog')?.classList.remove('active');
        }

        async function exportMembers() {
            if (!db) await initDatabase();
            const [members, notes] = await Promise.all([
                safeGetAllFromStore('members'),
                safeGetAllFromStore('member_notes')
            ]);
            const memberMap = new Map(members.map(member => [member.id, member]));
            const rows = members.map(member => [
                member.name || '', member.nickname || '', member.membership_type || '',
                memberMap.get(member.membership_partner_id)?.nickname || memberMap.get(member.membership_partner_id)?.name || '',
                member.membership_start_date || '', member.membership_end_date || '', member.phone || '', member.birthday || '',
                notes.filter(note => note.member_id === member.id)
                    .sort((a, b) => String(b.event_date || '').localeCompare(String(a.event_date || '')))
                    .map(note => `${note.event_date || ''} ${note.description || ''}`.trim()).join(' ; '),
                member.status || ''
            ]);
            downloadCsv('會員資料', ['姓名','暱稱','會籍類型','配對會員','會員開始日期','會員截止日','電話','生日','備忘錄','狀態'], rows);
        }

        function downloadCsv(fileName, headers, rows) {
            const quote = value => {
                const text = String(value == null ? '' : value);
                return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
            };
            const csv = [headers, ...rows].map(row => row.map(quote).join(',')).join('\n');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' }));
            link.download = `${fileName}_${getVenueDateString()}.csv`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 0);
        }

        async function showBoardSlotDialog(slotNumber) {
            if (!db) await initDatabase();
            const [boards, members] = await Promise.all([
                safeGetAllFromStore('board_storage'),
                safeGetAllFromStore('members')
            ]);
            const board = boards.find(row => Number(row.slot_number) === Number(slotNumber) && row.status === 'active');
            const member = board ? members.find(row => row.id === board.member_id) : null;
            const dialog = document.getElementById('board-slot-dialog');
            const dialogContent = dialog.querySelector('.modal-content');
            dialogContent.innerHTML = `<div style="padding:20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;">
                <h2 style="margin:0;">格位 #${slotNumber}</h2><button onclick="closeBoardSlotDialog()" style="border:0;background:none;font-size:24px;">×</button></div>
                <div style="padding:20px;line-height:1.9;">${board
                    ? `會員：${escapeHtml(member?.nickname || member?.name || '未知')}<br>開始：${escapeHtml(board.start_date || '—')}<br>到期：${escapeHtml(board.expires_at || '—')}<br>備註：${escapeHtml(board.notes || '—')}`
                    : '<span style="color:#999;">此格位尚未使用</span>'}</div>`;
            dialog.classList.add('active');
        }
        function openBoardSlotDialog(slotNumber) { void showBoardSlotDialog(slotNumber); }
        function closeBoardSlotDialog() {
            document.getElementById('board-slot-dialog')?.classList.remove('active');
        }

        // 檢查是否有已載入的資料庫
        window.addEventListener('load', async () => {
            try {
                // 設置檔案輸入事件監聽器
                setupFileInput();
                
                // 先顯示首頁（包含載入資料庫按鈕）
                document.getElementById('db-loader').classList.remove('active');
                document.getElementById('main-content').classList.remove('hidden');
                showHomePage();
                
                // 嘗試初始化資料庫（不阻塞首頁顯示）
                try {
                    await initDatabase();
                    await reconcileStoredBackupMeta();
                    showHomePage();
                    // 檢查是否有資料
                    if (db && db.objectStoreNames.contains('members')) {
                        const transaction = db.transaction(['members'], 'readonly');
                        const store = transaction.objectStore('members');
                        const countRequest = store.count();
                        
                        countRequest.onsuccess = () => {
                            if (countRequest.result > 0) {
                                console.log('✅ 資料庫已有資料');
                            }
                        };
                    }
                } catch (dbError) {
                    console.warn('資料庫初始化警告（不影響使用，可以點擊載入資料庫按鈕）:', dbError.message || dbError);
                    // 不顯示錯誤，讓用戶可以點擊載入資料庫按鈕
                }
            } catch (error) {
                console.error('初始化失敗:', error);
                // 即使出錯也顯示首頁
                document.getElementById('db-loader').classList.remove('active');
                document.getElementById('main-content').classList.remove('hidden');
                showHomePage();
            }
        });
    </script>
</body>
