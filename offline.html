        // 載入指定日期的預約（排除教練練習），並組合教練/駕駛/會員，更新 contact_name
        async function loadTomorrowBookings(selectedDate) {
            if (!db) await initDatabase();
            var startOfDay = selectedDate + 'T00:00:00';
            var endOfDay = selectedDate + 'T23:59:59';
            var allBookings = await getAllFromStore('bookings').catch(function() { return []; });
            var dateBookings = allBookings.filter(function(b) {
                if (b.status !== 'confirmed') return false;
                if (b.is_coach_practice) return false;
                var startAt = b.start_at;
                return startAt >= startOfDay && startAt <= endOfDay;
            }).sort(function(a, b) { return a.start_at.localeCompare(b.start_at); });
            
            if (dateBookings.length === 0) return [];
            
            var boats = await getAllFromStore('boats').catch(function() { return []; });
            var coaches = await getAllFromStore('coaches').catch(function() { return []; });
            var activeCoaches = coaches.filter(function(c) { return !c.status || c.status === 'active'; });
            var bookingIds = dateBookings.map(function(b) { return b.id; });
            var bookingCoaches = await getBookingCoaches(bookingIds);
            var bookingDrivers = await getBookingDrivers(bookingIds);
            var bookingMembers = await getBookingMembers(bookingIds);
            
            return dateBookings.map(function(booking) {
                var boat = boats.find(function(b) { return b.id === booking.boat_id; }) || null;
                var coachesForBooking = bookingCoaches.filter(function(bc) { return bc.booking_id === booking.id; })
                    .map(function(bc) { return activeCoaches.find(function(c) { return c.id === bc.coach_id; }); })
                    .filter(Boolean);
                var driversForBooking = bookingDrivers.filter(function(bd) { return bd.booking_id === booking.id; })
                    .map(function(bd) { return activeCoaches.find(function(c) { return c.id === bd.driver_id; }); })
                    .filter(Boolean);
                var membersForBooking = bookingMembers.filter(function(bm) { return bm.booking_id === booking.id; })
                    .map(function(bm) { return bm.members ? { id: bm.member_id, name: bm.members.name, nickname: bm.members.nickname } : null; })
                    .filter(Boolean);
                
                var contactName = booking.contact_name || '';
                if (membersForBooking.length > 0) {
                    var originalNames = contactName.split(',').map(function(n) { return n.trim(); });
                    if (membersForBooking.length === originalNames.length) {
                        contactName = membersForBooking.map(function(m) { return m.nickname || m.name; }).join(', ');
                    } else {
                        var updatedNames = [];
                        var processed = {};
                        originalNames.forEach(function(name) {
                            var matched = membersForBooking.find(function(m) {
                                if (name === m.name || name === m.nickname) return true;
                                var parts = name.split('/').map(function(p) { return p.trim(); });
                                return parts.some(function(part) { return part === m.name || part === m.nickname; });
                            });
                            if (matched && !processed[matched.id]) {
                                updatedNames.push(matched.nickname || matched.name);
                                processed[matched.id] = true;
                            } else if (!matched) {
                                updatedNames.push(name);
                            }
                        });
                        membersForBooking.forEach(function(m) {
                            if (!processed[m.id]) updatedNames.push(m.nickname || m.name);
                        });
                        if (updatedNames.length > 0) contactName = updatedNames.join(', ');
                    }
                }
                
                return {
                    id: booking.id,
                    boat_id: booking.boat_id,
                    contact_name: contactName,
                    start_at: booking.start_at,
                    duration_min: booking.duration_min,
                    activity_types: booking.activity_types,
                    notes: booking.notes,
                    boats: boat,
                    coaches: coachesForBooking,
                    drivers: driversForBooking
                };
            });
        }
        
        function formatTimeNoColon(dateString) {
            var datetime = (dateString || '').substring(0, 16);
            var parts = datetime.split('T');
            if (parts.length !== 2) return '';
            var timeStr = parts[1];
            var hm = timeStr.split(':');
            return (hm[0] || '00') + (hm[1] || '00');
        }
        
        function getArrivalTimeNoColon(dateString) {
            var datetime = (dateString || '').substring(0, 16);
            var parts = datetime.split('T');
            if (parts.length !== 2) return '';
            var hm = parts[1].split(':').map(Number);
            var totalMinutes = (hm[0] || 0) * 60 + (hm[1] || 0) - 30;
            var h = Math.floor(totalMinutes / 60);
            var m = totalMinutes % 60;
            return String(h).padStart(2, '0') + String(m).padStart(2, '0');
        }

        let fileInputSetup = false;

        function setupFileInput() {
            if (fileInputSetup) return; // 避免重複設置
            const fileInput = document.getElementById('sql-file');
            if (fileInput) {
                fileInputSetup = true;
                // 移除舊的事件監聽器（如果有的話）
                const newInput = fileInput.cloneNode(true);
                fileInput.parentNode.replaceChild(newInput, fileInput);
                
                // 添加新的事件監聽器
                newInput.addEventListener('change', function(e) {
                    // 防止重複觸發
                    if (isFileLoading) {
                        console.log('檔案正在載入中，忽略重複觸發');
                        e.target.value = ''; // 清空選擇，避免重複觸發
                        return;
                    }
                    
                    const file = e.target.files?.[0];
                    const fileNameDiv = document.getElementById('file-name');
                    
                    if (file) {
                        console.log('選擇了檔案:', file.name, '大小:', file.size, 'bytes');
                        if (fileNameDiv) {
                            fileNameDiv.textContent = `已選擇: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                            fileNameDiv.style.color = '#667eea';
                        }
                        // loadSQLFile 函數內部會設置 isFileLoading 標記並禁用 input
                        loadSQLFile(file);
                    } else {
                        console.log('未選擇檔案');
                        if (fileNameDiv) {
                            fileNameDiv.textContent = '';
                        }
                    }
                });
                
                // label 的 for 屬性已經足夠觸發 input，不需要額外的點擊事件

                    }, true); // 使用 capture phase 確保優先處理
                }
                
                console.log('✅ 檔案輸入事件監聽器已設置');

        }
        
        // 渲染置板區塊
        function renderBoardSection(section, slotMap) {
            const slotPairs = [];
            
            if (section.upperOnly) {
                for (let i = section.start; i <= section.end; i++) {
                    slotPairs.push({ upper: i, lower: null });
                }
            } else {
                for (let i = section.start; i <= section.end; i += 2) {
                    const lower = i;
                    const upper = i + 1;
                    slotPairs.push({
                        upper: upper <= section.end ? upper : null,
                        lower: lower <= section.end ? lower : null
                    });
                }
            }
            
            return `
                <div style="margin-bottom: 30px;">
                    <h3 style="margin: 0 0 15px 0; font-size: 18px; font-weight: bold; color: white; background: linear-gradient(135deg, #5a5a5a 0%, #4a4a4a 100%); padding: 12px; border-radius: 8px;">
                        ${section.name} (${section.start}-${section.end})
                    </h3>
                    <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px;">
                            ${slotPairs.map(pair => `
                                <div style="display: flex; flex-direction: column; gap: 6px;">
                                    ${pair.upper ? renderBoardSlot(pair.upper, slotMap[pair.upper]) : '<div></div>'}
                                    ${pair.lower ? renderBoardSlot(pair.lower, slotMap[pair.lower]) : '<div></div>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染單個置板格位
        function renderBoardSlot(slotNumber, board) {
            const isOccupied = !!board;
            
            // 計算到期狀態
            let expiryStatus = 'empty';
            if (isOccupied && board.expires_at) {
                const today = new Date();
                const expiryDate = new Date(board.expires_at);
                const daysUntilExpiry = Math.ceil((expiryDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                if (daysUntilExpiry < 0) expiryStatus = 'expired';
                else if (daysUntilExpiry <= 30) expiryStatus = 'expiring';
                else expiryStatus = 'normal';
            }
            
            // 根據狀態設定顏色
            let slotStyles = {
                background: '#f5f5f5',
                color: '#999',
                border: '2px solid #e0e0e0'
            };
            
            if (expiryStatus === 'expired') {
                slotStyles = {
                    background: 'linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%)',
                    color: '#c62828',
                    border: '2px solid #ef9a9a'
                };
            } else if (expiryStatus === 'expiring') {
                slotStyles = {
                    background: 'linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%)',
                    color: '#e65100',
                    border: '2px solid #ffcc80'
                };
            } else if (expiryStatus === 'normal') {
                slotStyles = {
                    background: 'linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%)',
                    color: '#2e7d32',
                    border: '2px solid #a5d6a7'
                };
            }
            
            return `
                <div onclick="openBoardSlotDialog(${slotNumber})" style="
                    padding: 8px;
                    background: ${slotStyles.background};
                    color: ${slotStyles.color};
                    border-radius: 6px;
                    cursor: pointer;
                    border: ${slotStyles.border};
                    transition: all 0.2s;
                    height: 90px;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-start;
                    position: relative;
                    overflow: hidden;
                " onmouseenter="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'" 
                   onmouseleave="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                    <div style="font-size: 11px; font-weight: bold; opacity: 0.7; margin-bottom: 3px;">#${slotNumber}</div>
                    ${isOccupied ? `
                        <div style="font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;">
                            ${board.member_nickname || board.member_name || '未知'}
                        </div>
                        ${board.expires_at ? `
                            <div style="font-size: 10px; opacity: 0.85; margin-top: 3px; line-height: 1.2;">
                                📅 ${board.expires_at.split('T')[0]}
                            </div>
                        ` : ''}
                        ${board.notes ? `
                            <div style="font-size: 9px; opacity: 0.9; margin-top: 2px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${board.notes}">
                                📝 ${board.notes.length > 8 ? board.notes.substring(0, 8) + '...' : board.notes}
                            </div>
                        ` : ''}
                    ` : `
                        <div style="font-size: 12px; text-align: center; margin-top: 6px;">空位</div>
                    `}
                </div>
            `;
        }

        function openBoardSlotDialog(slotNumber) {
            showBoardSlotDialog(slotNumber);
        }

        // 匯出置板
        async function exportBoards() {
            try {
                if (!db) await initDatabase();
                
                const boards = await getAllFromStore('board_storage');
                const activeBoards = boards.filter(b => b.status === 'active');
                
                const members = await getAllFromStore('members');
                const membersMap = {};
                members.forEach(m => {
                    membersMap[m.id] = m;
                });
                
                const headers = ['姓名', '暱稱', '格位號碼', '到期日', '備註'];
                const rows = activeBoards.map(board => {
                    const member = membersMap[board.member_id];
                    return [
                        member?.name || '',
                        member?.nickname || '',
                        board.slot_number,
                        board.expires_at || '',
                        board.notes || ''
                    ];
                });
                
                const csvContent = [
                    headers.join(','),
                    ...rows.map(row => row.map(cell => {
                        const cellStr = String(cell);
                        if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
                            return `"${cellStr.replace(/"/g, '""')}"`;
                        }
                        return cellStr;
                    }).join(','))
                ].join('\n');
                
                const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                const today = new Date().toISOString().split('T')[0];
                link.download = `置板資料_${today}.csv`;
                link.click();
            } catch (error) {
                console.error('匯出失敗:', error);
                alert('匯出失敗：' + error.message);
            }
        }

        // 處理新增會員
        async function handleAddMember(event) {
            event.preventDefault();
            
            try {
                if (!db) await initDatabase();
                
                const name = document.getElementById('member-name').value.trim();
                const nickname = document.getElementById('member-nickname').value.trim();
                const phone = document.getElementById('member-phone').value.trim();
                const birthday = document.getElementById('member-birthday').value;
                const membershipType = document.getElementById('member-type').value;
                const membershipStartDate = document.getElementById('member-start-date').value;
                const membershipEndDate = document.getElementById('member-end-date').value;
                
                if (!name) {
                    alert('請輸入姓名');
                    return;
                }
                
                // 驗證電話格式
                if (phone && !/^09\d{8}$/.test(phone)) {
                    alert('電話需為 09 開頭的 10 位數字');
                    return;
                }
                
                // 生成會員 ID（使用 UUID 或時間戳）
                const memberId = 'member_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const memberData = {
                    id: memberId,
                    name: name,
                    nickname: nickname || null,
                    phone: phone || null,
                    birthday: birthday || null,
                    membership_type: membershipType,
                    membership_start_date: membershipStartDate || null,
                    membership_end_date: membershipEndDate || null,
                    balance: 0,
                    vip_voucher_amount: 0,
                    designated_lesson_minutes: 0,
                    boat_voucher_g23_minutes: 0,
                    boat_voucher_g21_panther_minutes: 0,
                    gift_boat_hours: 0,
                    status: 'active',
                    created_at: new Date().toISOString(),
                    updated_at: null
                };
                
                // 插入到 IndexedDB
                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                await new Promise((resolve, reject) => {
                    const request = store.add(memberData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
                
                // 如果有會員開始日期，新增備忘錄
                if (membershipStartDate && membershipType !== 'guest') {
                    try {
                        await createTableIfNotExists('member_notes', 'id', true);
                        const notesTransaction = db.transaction(['member_notes'], 'readwrite');
                        const notesStore = notesTransaction.objectStore('member_notes');
                        await new Promise((resolve, reject) => {
                            const request = notesStore.add({
                                member_id: memberId,
                                event_date: membershipStartDate,
                                event_type: '入會',
                                description: '入會'
                            });
                            request.onsuccess = () => resolve();
                            request.onerror = () => reject(request.error);
                        });
                    } catch (e) {
                        console.warn('無法新增備忘錄:', e);
                    }
                }
                
                alert('會員新增成功！');
                closeAddMemberDialog();
                await loadAndDisplayMembers();
            } catch (error) {
                console.error('新增會員失敗:', error);
                alert('新增會員失敗：' + error.message);
            }
        }

        // 處理編輯會員
        async function handleEditMember(event, memberId) {
            event.preventDefault();
            
            try {
                if (!db) await initDatabase();
                
                const name = document.getElementById('edit-member-name').value.trim();
                const nickname = document.getElementById('edit-member-nickname').value.trim();
                const phone = document.getElementById('edit-member-phone').value.trim();
                const birthday = document.getElementById('edit-member-birthday').value;
                const membershipType = document.getElementById('edit-member-type').value;
                const membershipStartDate = document.getElementById('edit-member-start-date').value;
                const membershipEndDate = document.getElementById('edit-member-end-date').value;
                
                if (!name) {
                    alert('請輸入姓名');
                    return;
                }
                
                // 驗證電話格式
                if (phone && !/^09\d{8}$/.test(phone)) {
                    alert('電話需為 09 開頭的 10 位數字');
                    return;
                }
                
                // 載入現有會員資料以保留其他欄位
                const members = await getAllFromStore('members');
                const existingMember = members.find(m => m.id === memberId);
                
                if (!existingMember) {
                    alert('找不到會員資料');
                    return;
                }
                
                // 更新會員資料
                const updatedMemberData = {
                    ...existingMember,
                    name: name,
                    nickname: nickname || null,
                    phone: phone || null,
                    birthday: birthday || null,
                    membership_type: membershipType,
                    membership_start_date: membershipStartDate || null,
                    membership_end_date: membershipEndDate || null,
                    updated_at: new Date().toISOString()
                };
                
                // 更新到 IndexedDB
                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                await new Promise((resolve, reject) => {
                    const request = store.put(updatedMemberData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
                
                alert('會員資料更新成功！');
                closeAddMemberDialog();
                
                // 如果會員詳情對話框是開啟的，重新載入
                const detailDialog = document.getElementById('member-detail-dialog');
                if (detailDialog && detailDialog.classList.contains('active')) {
                    await showMemberDetailDialog(memberId);
                }
                
                // 重新載入會員列表
                await loadAndDisplayMembers();
            } catch (error) {
                console.error('更新會員失敗:', error);
                alert('更新會員失敗：' + error.message);
            }
        }

        // 匯出會員資料
        async function exportMembers() {
            try {
                if (!db) await initDatabase();
                
                // 載入所有會員資料和備忘錄
                const [allMembers, memberNotes] = await Promise.all([
                    getAllFromStore('members'),
                    getAllFromStore('member_notes').catch(() => [])
                ]);
                
                if (allMembers.length === 0) {
                    alert('沒有會員資料可以導出');
                    return;
                }
                
                // 整理備忘錄資料
                const memberNotesMap = {};
                memberNotes.forEach(note => {
                    if (!memberNotesMap[note.member_id]) {
                        memberNotesMap[note.member_id] = [];
                    }
                    const noteStr = note.event_date 
                        ? `${note.event_date} ${note.description}`
                        : note.description;
                    memberNotesMap[note.member_id].push(noteStr);
                });
                
                // 準備 CSV 內容
                const headers = [
                    '姓名', '暱稱', '會籍類型', '配對會員', 
                    '會員開始日期', '會員截止日', '電話', '生日', '備忘錄', '狀態'
                ];
                
                const rows = allMembers.map(member => {
                    // 會籍類型
                    let membershipTypeLabel = '一般會員';
                    if (member.membership_type === 'dual') {
                        membershipTypeLabel = '雙人會員';
                    } else if (member.membership_type === 'guest') {
                        membershipTypeLabel = '非會員';
                    } else if (member.membership_type === 'es') {
                        membershipTypeLabel = 'ES';
                    }
                    
                    // 配對會員（目前離線版不支援，留空）
                    const partnerName = '';
                    
                    // 備忘錄（用分號分隔）
                    const notesStr = memberNotesMap[member.id]?.join(' ; ') || '';
                    
                    // 格式化日期
                    const formatDate = (dateStr) => {
                        if (!dateStr) return '';
                        return dateStr.split('T')[0];
                    };
                    
                    return [
                        member.name || '',
                        member.nickname || '',
                        membershipTypeLabel,
                        partnerName,
                        formatDate(member.membership_start_date),
                        formatDate(member.membership_end_date),
                        member.phone || '',
                        formatDate(member.birthday),
                        notesStr,
                        member.status === 'active' ? '啟用' : '隱藏'
                    ];
                });
                
                // 生成 CSV 內容
                const csvContent = [
                    headers.join(','),
                    ...rows.map(row => row.map(cell => {
                        // 處理包含逗號、換行符或雙引號的內容
                        const cellStr = String(cell);
                        if (cellStr.includes(',') || cellStr.includes('\n') || cellStr.includes('"')) {
                            return `"${cellStr.replace(/"/g, '""')}"`;
                        }
                        return cellStr;
                    }).join(','))
                ].join('\n');
                
                // 下載檔案
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                
                const today = new Date();
                const dateStr = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
                link.setAttribute('download', `會員資料_${dateStr}.csv`);
                
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                alert(`成功導出 ${allMembers.length} 位會員資料`);
            } catch (error) {
                console.error('導出失敗:', error);
                alert('導出失敗：' + error.message);
            }
        }
        
        // 續約會籍
        async function renewMembership(memberId) {
            const newEndDate = prompt('請輸入新的到期日（YYYY-MM-DD）：');
            if (!newEndDate) return;
            
            try {
                if (!db) await initDatabase();
                
                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                const getRequest = store.get(memberId);
                
                await new Promise((resolve, reject) => {
                    getRequest.onsuccess = () => {
                        const member = getRequest.result;
                        if (!member) {
                            reject(new Error('找不到會員'));
                            return;
                        }
                        
                        member.membership_end_date = newEndDate;
                        member.updated_at = new Date().toISOString();
                        
                        const updateRequest = store.put(member);
                        updateRequest.onsuccess = () => resolve();
                        updateRequest.onerror = () => reject(updateRequest.error);
                    };
                    getRequest.onerror = () => reject(getRequest.error);
                });
                
                // 新增備忘錄
                try {
                    await createTableIfNotExists('member_notes', 'id', true);
                    const notesTransaction = db.transaction(['member_notes'], 'readwrite');
                    const notesStore = notesTransaction.objectStore('member_notes');
                    await new Promise((resolve, reject) => {
                        const request = notesStore.add({
                            member_id: memberId,
                            event_date: new Date().toISOString().split('T')[0],
                            event_type: '續約',
                            description: `續約至 ${newEndDate}`
                        });
                        request.onsuccess = () => resolve();
                        request.onerror = () => reject(request.error);
                    });
                } catch (e) {
                    console.warn('無法新增備忘錄:', e);
                }
                
                alert('續約成功！');
                await showMemberDetailDialog(memberId);

        // 處理新增交易
        async function handleAddTransaction(event, memberId) {
            event.preventDefault();
            
            try {
                if (!db) await initDatabase();
                
                const category = document.getElementById('tx-category').value;
                const adjustType = window.currentTransactionType || 'increase';
                const value = parseFloat(document.getElementById('tx-value').value);
                const transactionDate = document.getElementById('tx-date').value;
                const description = document.getElementById('tx-description').value.trim();
                const notes = document.getElementById('tx-notes').value.trim();
                
                if (isNaN(value) || value < 0) {
                    alert('請輸入有效的數值');
                    return;
                }
                
                if (!description) {
                    alert('請輸入說明');
                    return;
                }
                
                // 載入會員資料
                const members = await getAllFromStore('members');
                const member = members.find(m => m.id === memberId);
                
                if (!member) {
                    alert('找不到會員資料');
                    return;
                }
                
                // 計算新值
                const delta = adjustType === 'increase' ? value : -value;
                const CATEGORIES = {
                    'balance': { field: 'balance', type: 'amount' },
                    'vip_voucher': { field: 'vip_voucher_amount', type: 'amount' },
                    'designated_lesson': { field: 'designated_lesson_minutes', type: 'minutes' },
                    'boat_voucher_g23': { field: 'boat_voucher_g23_minutes', type: 'minutes' },
                    'boat_voucher_g21_panther': { field: 'boat_voucher_g21_panther_minutes', type: 'minutes' },
                    'gift_boat_hours': { field: 'gift_boat_hours', type: 'minutes' }
                };
                
                const categoryConfig = CATEGORIES[category];
                if (!categoryConfig) {
                    alert('無效的項目');
                    return;
                }
                
                // 更新會員餘額
                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                const getRequest = store.get(memberId);
                
                await new Promise((resolve, reject) => {
                    getRequest.onsuccess = () => {
                        const member = getRequest.result;
                        if (!member) {
                            reject(new Error('找不到會員'));
                            return;
                        }
                        
                        member[categoryConfig.field] = (member[categoryConfig.field] || 0) + delta;
                        member.updated_at = new Date().toISOString();
                        
                        const updateRequest = store.put(member);
                        updateRequest.onsuccess = () => resolve();
                        updateRequest.onerror = () => reject(updateRequest.error);
                    };
                    getRequest.onerror = () => reject(getRequest.error);
                });
                
                // 記錄交易
                await createTableIfNotExists('transactions', 'id', true);
                const txTransaction = db.transaction(['transactions'], 'readwrite');
                const txStore = txTransaction.objectStore('transactions');
                
                await new Promise((resolve, reject) => {
                    const request = txStore.add({
                        member_id: memberId,
                        transaction_type: 'adjust',
                        category: category,
                        adjust_type: adjustType,
                        amount: categoryConfig.type === 'amount' ? value : null,
                        minutes: categoryConfig.type === 'minutes' ? value : null,
                        description: description,
                        notes: notes || null,
                        transaction_date: transactionDate,
                        created_at: new Date().toISOString()
                    });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
                
                const unit = categoryConfig.type === 'amount' ? '$' : '分';
                const changeText = adjustType === 'increase' ? `+${unit}${value.toLocaleString()}` : `-${unit}${value.toLocaleString()}`;
                alert(`記帳成功！${changeText}`);
                
                closeTransactionDialog();
                await loadAndDisplayMemberTransactions();
                if (window.currentMemberDetail) {
                    await showMemberDetailDialog(memberId);
                }
            } catch (error) {
                console.error('記帳失敗:', error);
                alert('記帳失敗：' + error.message);
            }
        }

                const membersMap = {};
                members.forEach(m => {
                    membersMap[m.id] = m;
                });
                
                const dialog = document.getElementById('board-slot-dialog');
                if (!dialog) return;
                
                if (board) {
                    const member = membersMap[board.member_id];
                    const formatDate = (dateStr) => {
                        if (!dateStr) return '';
                        return dateStr.split('T')[0];
                    };
                    
                    dialog.innerHTML = `
                        <div style="padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <h2 style="margin: 0; font-size: 20px; font-weight: bold;">格位 ${slotNumber}</h2>
                            <button onclick="closeBoardSlotDialog()" style="border: none; background: none; font-size: 24px; cursor: pointer; color: #666; padding: 0 8px;">×</button>
                        </div>
                        <div style="padding: 20px;">
                            <div style="margin-bottom: 20px; padding: 16px; background: #f8f9fa; border-radius: 8px;">
                                <div style="font-size: 14px; color: #666; margin-bottom: 8px;">會員</div>
                                <div style="font-size: 18px; font-weight: bold;">${member?.nickname || member?.name || '未知'}</div>
                            </div>
                            ${board.start_date ? `
                                <div style="margin-bottom: 16px;">
                                    <div style="font-size: 14px; color: #666; margin-bottom: 8px;">開始日期</div>
                                    <div style="font-size: 16px;">${formatDate(board.start_date)}</div>
                                </div>
                            ` : ''}
                            ${board.expires_at ? `
                                <div style="margin-bottom: 16px;">
                                    <div style="font-size: 14px; color: #666; margin-bottom: 8px;">到期日期</div>
                                    <div style="font-size: 16px;">${formatDate(board.expires_at)}</div>
                                </div>
                            ` : ''}
                            ${board.notes ? `
                                <div style="margin-bottom: 16px;">
                                    <div style="font-size: 14px; color: #666; margin-bottom: 8px;">備註</div>
                                    <div style="font-size: 14px; font-style: italic; color: #999;">${board.notes}</div>
                                </div>
                            ` : ''}
                            <div style="display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                                <button onclick="openEditBoardDialog('${board.id}', ${slotNumber})" style="flex: 1; padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer;">✏️ 編輯</button>
                                <button onclick="deleteBoard('${board.id}', ${slotNumber}, '${board.member_id}')" style="flex: 1; padding: 10px 20px; background: #f44336; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer;">🗑️ 刪除</button>
                            </div>
                        </div>
                    `;
                } else {
                    dialog.innerHTML = `
                        <div style="padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <h2 style="margin: 0; font-size: 20px; font-weight: bold;">格位 ${slotNumber}</h2>
                            <button onclick="closeBoardSlotDialog()" style="border: none; background: none; font-size: 24px; cursor: pointer; color: #666; padding: 0 8px;">×</button>
                        </div>
                        <div style="padding: 40px 20px; text-align: center; color: #999;">
                            <div style="font-size: 48px; margin-bottom: 16px;">🏄</div>
                            <div style="font-size: 16px; margin-bottom: 20px;">此格位尚未使用</div>
                            <button onclick="openAddBoardSlotDialog(${slotNumber})" style="padding: 12px 24px; background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;">新增置板</button>
                        </div>
                    `;
                }
                
                dialog.classList.add('active');
            } catch (error) {
                console.error('載入置板格位對話框失敗:', error);
                alert('載入置板格位對話框失敗：' + error.message);
            }
        }
        
        // 關閉置板格位對話框
        function closeBoardSlotDialog() {
            const dialog = document.getElementById('board-slot-dialog');
            if (dialog) {
                dialog.classList.remove('active');
            }
        }
        
        // 開啟新增置板格位對話框
        function openAddBoardSlotDialog(slotNumber) {
            const memberSearch = prompt('請輸入會員姓名或暱稱：');
            if (!memberSearch) return;
            
            // 搜尋會員
            searchMemberForBoard(memberSearch, slotNumber);
        }
        
        // 搜尋會員並新增置板
        async function searchMemberForBoard(searchTerm, slotNumber) {
            try {
                if (!db) await initDatabase();
                
                const members = await getAllFromStore('members');
                const activeMembers = members.filter(m => m.status === 'active');
                
                const matched = activeMembers.filter(m => {
                    const name = (m.name || '').toLowerCase();
                    const nickname = (m.nickname || '').toLowerCase();
                    return name.includes(searchTerm.toLowerCase()) || nickname.includes(searchTerm.toLowerCase());
                });
                
                if (matched.length === 0) {
                    alert('找不到會員');
                    return;
                }
                
                if (matched.length > 1) {
                    const memberList = matched.map((m, i) => `${i + 1}. ${m.nickname || m.name}`).join('\n');
                    const index = prompt(`找到多個會員，請選擇：\n${memberList}\n\n請輸入編號：`);
                    if (!index) return;
                    const selectedIndex = parseInt(index) - 1;
                    if (selectedIndex < 0 || selectedIndex >= matched.length) {
                        alert('無效的編號');
                        return;
                    }
                    const member = matched[selectedIndex];
                    const startDate = prompt('請輸入開始日期（YYYY-MM-DD，選填）：') || null;
                    const expiresAt = prompt('請輸入到期日期（YYYY-MM-DD，選填）：') || null;
                    const notes = prompt('請輸入備註（選填）：') || null;
                    await addBoard(member.id, slotNumber, startDate, expiresAt, notes);
                } else {
                    const member = matched[0];
                    const startDate = prompt('請輸入開始日期（YYYY-MM-DD，選填）：') || null;
                    const expiresAt = prompt('請輸入到期日期（YYYY-MM-DD，選填）：') || null;
                    const notes = prompt('請輸入備註（選填）：') || null;
                    await addBoard(member.id, slotNumber, startDate, expiresAt, notes);
                }
                
                closeBoardSlotDialog();
                await loadAndDisplayBoards();
            } catch (error) {
                console.error('搜尋會員失敗:', error);
                alert('搜尋會員失敗：' + error.message);
            }
        }
        
        // 刪除置板
        async function deleteBoard(boardId, slotNumber, memberId) {
            if (!confirm(`確定要刪除格位 #${slotNumber} 嗎？`)) return;
            
            try {
                if (!db) await initDatabase();
                
                const transaction = db.transaction(['board_storage'], 'readwrite');
                const store = transaction.objectStore('board_storage');
                
                await new Promise((resolve, reject) => {
                    const request = store.delete(boardId);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
                
                // 新增備忘錄
                try {
                    await createTableIfNotExists('member_notes', 'id', true);
                    const notesTransaction = db.transaction(['member_notes'], 'readwrite');
                    const notesStore = notesTransaction.objectStore('member_notes');
                    await new Promise((resolve, reject) => {
                        const request = notesStore.add({
                            member_id: memberId,
                            event_date: new Date().toISOString().split('T')[0],
                            event_type: '備註',
                            description: `移除置板 #${slotNumber}`
                        });
                        request.onsuccess = () => resolve();
                        request.onerror = () => reject(request.error);
                    });
                } catch (e) {
                    console.warn('無法新增備忘錄:', e);
                }
                
                alert(`已刪除格位 #${slotNumber}`);
                closeBoardSlotDialog();
                await loadAndDisplayBoards();
                if (window.currentMemberDetail) {
                    await showMemberDetailDialog(memberId);
                }
                await loadAndDisplayMembers();
            } catch (error) {
                console.error('刪除置板失敗:', error);
                alert('刪除置板失敗：' + error.message);
            }
        }
        
        // 檢查是否有已載入的資料庫
        window.addEventListener('load', async () => {
            try {
                // 設置檔案輸入事件監聽器
                setupFileInput();
                
                // 先顯示首頁（包含載入資料庫按鈕）
                document.getElementById('db-loader').classList.remove('active');
                document.getElementById('main-content').classList.remove('hidden');
                showHomePage();
                
                // 嘗試初始化資料庫（不阻塞首頁顯示）
                try {
                    await initDatabase();
                    // 檢查是否有資料
                    if (db && db.objectStoreNames.contains('members')) {
                        const transaction = db.transaction(['members'], 'readonly');
                        const store = transaction.objectStore('members');
                        const countRequest = store.count();
                        
                        countRequest.onsuccess = () => {
                            if (countRequest.result > 0) {
                                console.log('✅ 資料庫已有資料');
                            }
                        };
                    }
                } catch (dbError) {
                    console.warn('資料庫初始化警告（不影響使用，可以點擊載入資料庫按鈕）:', dbError.message || dbError);
                    // 不顯示錯誤，讓用戶可以點擊載入資料庫按鈕
                }
            } catch (error) {
                console.error('初始化失敗:', error);
                // 即使出錯也顯示首頁
                document.getElementById('db-loader').classList.remove('active');
                document.getElementById('main-content').classList.remove('hidden');
                showHomePage();
            }
        });
    </script>
</body>
</html>
