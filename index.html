<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_circle (black).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ES Wake</title>
    <meta name="description" content="ES Wake 滑水學校 Shop — 各式滑水裝備、救生衣、防寒衣，可加入購物車後透過 LINE 詢問購買" />

    <!--
      Open Graph：LINE / Facebook / iMessage 等貼網址時的預覽卡片。
      所有商品分享出去都顯示同一張店家卡片（A 方案）；之後若要每件商品獨立預覽，
      需要在 Vercel 加 Edge Function 動態注入（C 方案）。

      og:image 必須是「絕對網址」，目前指向 Vercel 預設 production 網域上的 logo。
      shop.eswakeschool.com 上線後，可把 og:image 改成 https://shop.eswakeschool.com/logo.png
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ES Wake" />
    <meta property="og:title" content="ES Wake Shop" />
    <meta property="og:description" content="各式滑水裝備、救生衣、防寒衣 — 線上瀏覽，透過 LINE 直接詢問購買" />
    <meta property="og:image" content="https://eswake-booking.vercel.app/logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card（X / Twitter 預覽，順手加沒成本） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ES Wake Shop" />
    <meta name="twitter:description" content="各式滑水裝備、救生衣、防寒衣" />
    <meta name="twitter:image" content="https://eswake-booking.vercel.app/logo.png" />

    <!-- LIFF：提前連 LINE CDN；略過 Google Fonts 以加快首次載入 -->
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin />
    <link rel="preconnect" href="https://api.line.me" />
    <style>
      html, body, #root {
        margin: 0;
        min-height: 100%;
        background: #f4f5f7;
      }
      body, #root {
        min-height: 100vh;
      }
      #app-boot {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 24px;
        background: #f4f5f7;
        color: #666;
        font-size: 14px;
        font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei UI', 'Microsoft JhengHei', system-ui, sans-serif;
      }
    </style>
    <script>
      var path = location.pathname
      var host = location.hostname.toLowerCase()
      var isLiff = path === '/liff' || path.indexOf('/liff/') === 0
      var isPublicBook = host === 'book.eswakeschool.com' || path === '/book' || path === '/book/'
      var isPublicGuide = host === 'guide.eswakeschool.com' || path === '/book/guide' || path.indexOf('/book/guide/') === 0
      var isPublic = isPublicBook || isPublicGuide
      if (!isLiff && !isPublic) {
        var g1 = document.createElement('link')
        g1.rel = 'preconnect'
        g1.href = 'https://fonts.googleapis.com'
        document.head.appendChild(g1)
        var g2 = document.createElement('link')
        g2.rel = 'preconnect'
        g2.href = 'https://fonts.gstatic.com'
        g2.crossOrigin = 'anonymous'
        document.head.appendChild(g2)
        var g3 = document.createElement('link')
        g3.rel = 'stylesheet'
        g3.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Noto+Sans+TC:wght@400..900&display=swap'
        document.head.appendChild(g3)
      }
    </script>
  </head>
  <body>
    <div id="root"><div id="app-boot">載入中…</div></div>
    <script>
      var boot = document.getElementById('app-boot')
      if (boot && isLiff) boot.textContent = '載入會員專區…'
      if (boot && isPublicBook) boot.textContent = '載入預約表單…'
      if (boot && isPublicGuide) boot.textContent = '載入行前須知…'

      function showBootFailure() {
        var currentBoot = document.getElementById('app-boot')
        if (!currentBoot || currentBoot.getAttribute('data-failed') === 'true') return
        currentBoot.setAttribute('data-failed', 'true')
        currentBoot.textContent = ''

        var message = document.createElement('div')
        message.textContent = '會員專區載入失敗，請檢查網路後重試。'
        message.style.fontWeight = '600'
        message.style.color = '#333'

        var retry = document.createElement('button')
        retry.type = 'button'
        retry.textContent = '重新載入'
        retry.style.padding = '10px 18px'
        retry.style.border = '0'
        retry.style.borderRadius = '10px'
        retry.style.background = '#1f4e78'
        retry.style.color = '#fff'
        retry.style.fontSize = '14px'
        retry.onclick = function () { window.location.reload() }

        currentBoot.appendChild(message)
        currentBoot.appendChild(retry)
      }

      window.addEventListener('app-boot-error', showBootFailure)
      window.addEventListener('error', function () {
        if (document.getElementById('app-boot')) showBootFailure()
      })
      window.addEventListener('unhandledrejection', function () {
        if (document.getElementById('app-boot')) showBootFailure()
      })
      window.setTimeout(function () {
        if (document.getElementById('app-boot')) showBootFailure()
      }, 15000)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
