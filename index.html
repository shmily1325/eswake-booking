<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_circle (black).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ES Wake</title>
    <meta name="description" content="ES Wake 滑水學校 Shop — 各式滑水裝備、救生衣、防寒衣，可加入購物車後透過 LINE 詢問購買" />

    <!--
      Open Graph：LINE / Facebook / iMessage 等貼網址時的預覽卡片。
      所有商品分享出去都顯示同一張店家卡片（A 方案）；之後若要每件商品獨立預覽，
      需要在 Vercel 加 Edge Function 動態注入（C 方案）。

      og:image 必須是「絕對網址」，目前指向 Vercel 預設 production 網域上的 logo。
      shop.eswakeschool.com 上線後，可把 og:image 改成 https://shop.eswakeschool.com/logo.png
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ES Wake" />
    <meta property="og:title" content="ES Wake Shop" />
    <meta property="og:description" content="各式滑水裝備、救生衣、防寒衣 — 線上瀏覽，透過 LINE 直接詢問購買" />
    <meta property="og:image" content="https://eswake-booking.vercel.app/logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card（X / Twitter 預覽，順手加沒成本） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ES Wake Shop" />
    <meta name="twitter:description" content="各式滑水裝備、救生衣、防寒衣" />
    <meta name="twitter:image" content="https://eswake-booking.vercel.app/logo.png" />

    <!--
      Web font：Inter（拉丁字）+ Noto Sans TC（中文）
      - 用 variable font 一個檔案涵蓋 400~900 全 weight，網路傳輸更省
      - display=swap：避免 FOIT，先顯示 fallback 字體、字載完再 swap
      - preconnect 提前建立連線，第一次載入快幾百毫秒
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Noto+Sans+TC:wght@400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
