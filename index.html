<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_circle (black).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ES Wake</title>
    <meta name="description" content="ES Wake 滑水學校線上商城 — 各式滑水裝備、救生衣、防寒衣，可加入購物車後透過 LINE 詢問購買" />

    <!--
      Open Graph：LINE / Facebook / iMessage 等貼網址時的預覽卡片。
      所有商品分享出去都顯示同一張店家卡片（A 方案）；之後若要每件商品獨立預覽，
      需要在 Vercel 加 Edge Function 動態注入（C 方案）。

      og:image 必須是「絕對網址」，目前指向 Vercel 預設 production 網域上的 logo。
      未來把網域換成 shop.eswakeschool.com 後，記得把這行的 host 一起改。
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ES Wake" />
    <meta property="og:title" content="ES Wake 商城" />
    <meta property="og:description" content="各式滑水裝備、救生衣、防寒衣 — 線上瀏覽，透過 LINE 直接詢問購買" />
    <meta property="og:image" content="https://eswake-booking.vercel.app/logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card（X / Twitter 預覽，順手加沒成本） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ES Wake 商城" />
    <meta name="twitter:description" content="各式滑水裝備、救生衣、防寒衣" />
    <meta name="twitter:image" content="https://eswake-booking.vercel.app/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
